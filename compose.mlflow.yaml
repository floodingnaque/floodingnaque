
# MLflow Local Development Docker Compose
# ========================================
#
# Local MLflow server deployment for experiment tracking
# and model registry during development.
#
# Usage:
#   docker compose -f compose.mlflow.yaml up -d
#
# Access:
#   MLflow UI: http://localhost:5001
#   Artifact store: ./mlflow/artifacts
#   Backend store: PostgreSQL
#
# Stop:
#   docker compose -f compose.mlflow.yaml down
#
# With data cleanup:
#   docker compose -f compose.mlflow.yaml down -v
#
# This file inherits shared anchors from compose.yaml via include directive.
# Requires Docker Compose v2.20+

include:
  - compose.yaml

name: floodingnaque-mlflow

services:
  # ==========================================================================
  # MLflow Tracking Server
  # ==========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: floodingnaque-mlflow
    restart: unless-stopped
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "mlflow"
      com.floodingnaque.description: "ML Experiment Tracking"
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
      # PostgreSQL backend (production-like)
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@mlflow-db:5432/mlflow
      # Artifact store
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
      - ./mlflow/models:/mlflow/models
    depends_on:
      mlflow-db:
        condition: service_healthy
    command: >  # pragma: allowlist secret
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@mlflow-db:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # PostgreSQL Database for MLflow Backend Store
  # ==========================================================================
  mlflow-db:
    image: postgres:15-alpine
    container_name: floodingnaque-mlflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow  # pragma: allowlist secret
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-db-data:/var/lib/postgresql/data
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================================================
  # MinIO S3-Compatible Object Storage (Optional)
  # ==========================================================================
  # Uncomment this section if you want to use S3-compatible storage
  # instead of local filesystem for artifacts
  #
  # minio:
  #   image: minio/minio:latest
  #   container_name: floodingnaque-minio
  #   restart: unless-stopped
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio-data:/data
  #   command: server /data --console-address ":9001"
  #   networks:
  #     - mlflow-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

# ===================
# Networks
# ===================
networks:
  mlflow-network:
    driver: bridge
    name: floodingnaque-mlflow

# ===================
# Volumes
# ===================
volumes:
  mlflow-artifacts:
    name: floodingnaque-mlflow-artifacts
  mlflow-db-data:
    name: floodingnaque-mlflow-db-data
