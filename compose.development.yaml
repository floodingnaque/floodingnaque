# =====================================================
# Floodingnaque - Development Docker Compose
# =====================================================
# Usage:
#   docker compose -f compose.development.yaml up -d --build
#   docker compose -f compose.development.yaml logs -f backend
#   docker compose -f compose.development.yaml down
#
# Hot-reload with watch (requires Docker Compose v2.22+):
#   docker compose -f compose.development.yaml watch
# =====================================================
# NOTE: This configuration uses Supabase as the database.
#       Ensure DATABASE_URL is set in ./backend/.env.development pointing to Supabase.
#
# This file inherits shared anchors from compose.yaml via include directive.
# Requires Docker Compose v2.20+
# =====================================================

include:
  - compose.yaml

name: floodingnaque-dev

services:
  # ===================
  # Backend API Service
  # ===================
  backend:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        PYTHON_VERSION: "3.13"
    image: floodingnaque-api:development
    container_name: floodingnaque-api-dev
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - APP_ENV=development
      - FLASK_DEBUG=True
      - PORT=5000
      - HOST=0.0.0.0
      - PYTHONPATH=/app
      # DATABASE_URL is loaded from .env.development file (points to Supabase)
      # Rate limiting - enabled to approximate Nginx layer behavior in staging/production.
      # Disable temporarily with RATE_LIMIT_ENABLED=False if it interferes with rapid testing.
      - RATE_LIMIT_ENABLED=True
      - SCHEDULER_ENABLED=True
      - LOG_LEVEL=DEBUG
      # CORS - explicit dev origins (avoids reliance on debug-mode fallback)
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5000
      # Security - stable dev keys so sessions survive restarts
      # WARNING: These values are for development ONLY. Never use in staging/production.
      - SECRET_KEY=dev-secret-key-not-for-production-do-not-reuse
      - JWT_SECRET_KEY=dev-jwt-secret-not-for-production-do-not-reuse
      # Feature flags
      - FEATURE_API_DOCS_ENABLED=True
      - GRAPHQL_PLAYGROUND_ENABLED=True
      - GRAPHQL_INTROSPECTION_ENABLED=True
    env_file:
      - ./backend/.env.development
    volumes:
      # Mount code for development hot-reload
      - ./backend/app:/app/app:ro
      - ./backend/config:/app/config:ro
      - ./backend/main.py:/app/main.py:ro
      # Persistent data
      - ./backend/models:/app/models
      - ./backend/data:/app/data
      - floodingnaque_logs_dev:/app/logs
    networks:
      - floodingnaque-dev
    depends_on: []  # No db dependency (using Supabase)
    # Inherits healthcheck, logging, resources from compose.yaml

  # ===================
  # Redis (Optional for Dev)
  # ===================
  redis:
    image: redis:7.2-alpine
    container_name: floodingnaque-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - floodingnaque-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-redis
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ===================
  # Celery Worker (Background Tasks)
  # ===================
  # Started with Redis: docker compose -f compose.development.yaml --profile with-redis up
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: floodingnaque-api:development
    container_name: floodingnaque-celery-dev
    restart: unless-stopped
    command: >
      celery -A app.services.celery_app worker
      --loglevel=debug
      --concurrency=1
      --max-tasks-per-child=50
      --time-limit=300
      --soft-time-limit=240
    environment:
      - APP_ENV=development
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CELERY_TIMEZONE=Asia/Manila
      - LOG_LEVEL=DEBUG
    env_file:
      - ./backend/.env.development
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/config:/app/config:ro
      - ./backend/models:/app/models
      - ./backend/data:/app/data
      - floodingnaque_logs_dev:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - floodingnaque-dev
    profiles:
      - with-redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ===================
  # Celery Beat (Task Scheduler)
  # ===================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: floodingnaque-api:development
    container_name: floodingnaque-celery-beat-dev
    restart: unless-stopped
    command: >
      celery -A app.services.celery_app beat
      --loglevel=debug
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    environment:
      - APP_ENV=development
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CELERY_TIMEZONE=Asia/Manila
      - CELERY_BEAT_RUNNING=true
      - LOG_LEVEL=DEBUG
    env_file:
      - ./backend/.env.development
    volumes:
      - floodingnaque_logs_dev:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - floodingnaque-dev
    profiles:
      - with-redis
    tmpfs:
      - /tmp:size=50M,mode=1777
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

# ===================
# Networks
# ===================
networks:
  floodingnaque-dev:
    driver: bridge
    name: floodingnaque-development

# ===================
# Volumes
# ===================
volumes:
  redis_data_dev:
    name: floodingnaque-redis-development
  floodingnaque_logs_dev:
    name: floodingnaque-logs-development
