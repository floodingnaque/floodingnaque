# =============================================================================
# Floodingnaque Feature Flags Configuration
# =============================================================================
#
# This file allows environment-specific feature flag overrides.
# Copy and customize for different environments (development, staging, production).
#
# Flag Types:
# - boolean: Simple on/off (use 'enabled: true/false')
# - percentage: Gradual rollout 0-100% (use 'percentage: 50')
#
# Override Priority:
# 1. Environment variables (FLOODINGNAQUE_FLAG_<NAME>=true)
# 2. This YAML file
# 3. Default values in code
#
# =============================================================================

# Environment identifier
environment: development

# =============================================================================
# Feature Flags
# =============================================================================
# IMPORTANT: These defaults are for DEVELOPMENT. In production, the
# environment is overridden by APP_ENV. Security-critical flags like
# api_auth_bypass default to DISABLED and must be explicitly enabled
# per-environment.
flags:

  # ---------------------------------------------------------------------------
  # ML/Training Features
  # ---------------------------------------------------------------------------

  mlflow_tracking:
    enabled: true
    description: "Enable MLflow experiment tracking"

  optuna_optimization:
    enabled: true
    description: "Enable Optuna hyperparameter optimization"

  model_calibration:
    enabled: true
    description: "Enable probability calibration"

  drift_detection:
    enabled: true
    description: "Enable data drift detection"

  temporal_validation:
    enabled: true
    description: "Enable temporal walk-forward CV"

  ensemble_stacking:
    enabled: true
    description: "Enable stacking ensemble models"

  # ---------------------------------------------------------------------------
  # Data Pipeline Features
  # ---------------------------------------------------------------------------

  data_validation:
    enabled: true
    description: "Enable data quality validation"

  meteostat_integration:
    enabled: true
    description: "Enable Meteostat historical weather data"

  earth_engine_integration:
    enabled: true
    description: "Enable Google Earth Engine satellite weather data (requires GCP service-account credentials in GOOGLE_APPLICATION_CREDENTIALS)"

  worldtides_integration:
    enabled: true
    description: "Enable WorldTides tidal data API (requires WORLDTIDES_API_KEY)"

  # ---------------------------------------------------------------------------
  # API Features
  # ---------------------------------------------------------------------------

  api_rate_limiting:
    enabled: true
    description: "Enable API rate limiting"

  api_caching:
    enabled: true
    description: "Enable response caching"

  api_auth_bypass:
    # SECURITY: Defaults to DISABLED even in development.
    # Must be explicitly enabled via environment variable:
    #   FLOODINGNAQUE_FLAG_API_AUTH_BYPASS=true
    enabled: false
    description: "Allow auth bypass (MUST be false in production)"
    metadata:
      security_critical: true
      allowed_environments: ["development"]

  # ---------------------------------------------------------------------------
  # Alerting Features
  # ---------------------------------------------------------------------------

  email_alerts:
    enabled: true
    description: "Enable email notifications"

  sms_alerts:
    enabled: true
    description: "Enable SMS notifications"

  slack_notifications:
    enabled: true
    description: "Enable Slack notifications"

  # ---------------------------------------------------------------------------
  # Monitoring Features
  # ---------------------------------------------------------------------------

  prometheus_metrics:
    enabled: true
    description: "Enable Prometheus metrics endpoint"

  detailed_logging:
    enabled: true  # More verbose in development
    description: "Enable verbose debug logging"

  performance_profiling:
    enabled: true
    description: "Enable request profiling (adds Server-Timing header)"

  # ---------------------------------------------------------------------------
  # Experimental Features (Gradual Rollout)
  # ---------------------------------------------------------------------------

  new_prediction_algorithm:
    type: percentage
    percentage: 10
    description: "Use new experimental prediction algorithm (canary rollout)"
    metadata:
      experimental: true
      jira: "FLOOD-123"

  v2_api:
    type: percentage
    percentage: 25
    description: "Enable V2 API endpoints (gradual rollout)"
    metadata:
      experimental: true

# =============================================================================
# Flag Groups
# =============================================================================
# Define custom groups for batch operations

groups:
  # Development mode - enable all debugging features
  debug_mode:
    - detailed_logging
    - performance_profiling
    - api_auth_bypass

  # Production hardening - disable risky features
  production_hardening:
    enable:
      - api_rate_limiting
      - data_validation
      - drift_detection
    disable:
      - api_auth_bypass
      - detailed_logging
      - performance_profiling
