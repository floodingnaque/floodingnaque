# =============================================================================
# Floodingnaque Feature Flags - DEVELOPMENT Overrides
# =============================================================================
# These values override the base feature_flags.yaml when APP_ENV=development.
# Optimized for local development workflow with verbose debugging.
# =============================================================================

flags:
  # ---------------------------------------------------------------------------
  # Data Pipeline - disable features that require external credentials
  # ---------------------------------------------------------------------------
  earth_engine_integration:
    enabled: false  # Requires GCP service-account credentials

  worldtides_integration:
    enabled: false  # Requires WORLDTIDES_API_KEY

  # ---------------------------------------------------------------------------
  # Monitoring - enable verbose debugging
  # ---------------------------------------------------------------------------
  detailed_logging:
    enabled: true

  performance_profiling:
    enabled: true

  # ---------------------------------------------------------------------------
  # Alerting - disable real notifications in dev
  # ---------------------------------------------------------------------------
  email_alerts:
    enabled: false  # No SMTP credentials in dev

  sms_alerts:
    enabled: false  # No Twilio/Semaphore credentials in dev

  slack_notifications:
    enabled: false  # No Slack webhook in dev

  # ---------------------------------------------------------------------------
  # Experimental - enable for testing
  # ---------------------------------------------------------------------------
  new_prediction_algorithm:
    percentage: 10

  v2_api:
    percentage: 25
