# Load Test Baseline Configuration
# ==================================
# Run against staging to establish performance baselines before production deploy.
#
# Usage:
#   locust -f tests/load/locustfile.py \
#     --config tests/load/baseline.conf \
#     --host https://staging-api.floodingnaque.com
#
# Results are saved to tests/load/results/ for tracking over time.

# Target baseline: 50 concurrent users, ramp 5/sec, run 2 minutes
users = 50
spawn-rate = 5
run-time = 2m

# Headless mode (no web UI) for CI
headless = true

# Output
html = tests/load/results/baseline_report.html
csv = tests/load/results/baseline

# Stop conditions (fail if these thresholds are exceeded)
# P95 response time must be under 2000ms
# Failure rate must be under 1%
