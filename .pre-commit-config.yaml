# Pre-commit hooks configuration for Floodingnaque
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# NOTE: Hooks use `language: script` with venv wrappers to ensure the correct
# Python/Node environment is used regardless of the caller's shell state.
# All Python tools must be installed in the venv at ./venv (or .venv).

repos:
  # ── Standard pre-commit utility hooks ─────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"] # allow custom YAML tags in compose files
      - id: end-of-file-fixer
        exclude: \.eslintcache$
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]

  # ── Python formatting: Black ──────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ["--line-length=120"]
        files: ^backend/.*\.py$

  # ── Python import sorting: isort ──────────────────────────────────────
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=120"]
        files: ^backend/.*\.py$

  # ── Python linting: flake8 ────────────────────────────────────────────
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--config=backend/.flake8"]
        files: ^backend/.*\.py$

  # ── Python type checking: mypy ────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/run-mypy.ps1
        files: ^backend/app/.*\.py$
        pass_filenames: false
        types: [python]

  # ── Python security: bandit ───────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-r", "--quiet", "-x", "tests,venv,.venv"]
        files: ^backend/.*\.py$
        exclude: ^backend/tests/.*\.py$

  # ── Frontend linting: ESLint ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: npx --prefix frontend eslint --cache --cache-location frontend/.eslintcache --config frontend/eslint.config.js --max-warnings 0
        types_or: [javascript, jsx, ts, tsx]
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$

  # ── Frontend type checking: TypeScript ────────────────────────────────
  - repo: local
    hooks:
      - id: tsc
        name: tsc
        language: system
        entry: npx --prefix frontend tsc --noEmit --incremental --project frontend/tsconfig.app.json
        types_or: [ts, tsx]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── Commit message validation ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: commitizen
        name: commitizen check
        entry: cz check
        language: system
        stages: [commit-msg]
        args: ["--commit-msg-file"]

  # ── GitGuardian (opt-in locally, runs in CI with API key) ─────────────
  # Run manually: pre-commit run ggshield --all-files
  # Requires: pipx install ggshield && ggshield auth login
  - repo: local
    hooks:
      - id: ggshield
        name: ggshield secret scan
        entry: ggshield secret scan pre-commit
        language: system
        stages: [manual]
        pass_filenames: true

# Files to exclude globally
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    __pycache__/|
    \.pytest_cache/|
    node_modules/|
    dist/|
    build/|
    .*\.egg-info/|
    backend/alembic/versions/.*\.py$
  )$
