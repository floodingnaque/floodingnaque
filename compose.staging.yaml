# =====================================================
# Floodingnaque - Staging Docker Compose
# =====================================================
# Usage:
#   docker compose -f compose.staging.yaml up -d --build
#   docker compose -f compose.staging.yaml logs -f backend
#   docker compose -f compose.staging.yaml down
#
# With observability (Grafana, Alertmanager, Jaeger):
#   docker compose -f compose.staging.yaml -f compose.observability.yaml up -d
# =====================================================
# NOTE: This configuration uses Supabase as the database.
#       Ensure DATABASE_URL is set in ./backend/.env.staging pointing to Supabase.
#
# This file inherits shared anchors from compose.yaml via include directive.
# Requires Docker Compose v2.20+
# =====================================================

include:
  - compose.yaml

name: floodingnaque-staging

services:
  # ===================
  # Backend API Service
  # ===================
  backend:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: floodingnaque-api-staging
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=staging
      - FLASK_DEBUG=False
      - PORT=5000
      - HOST=0.0.0.0
      - PYTHONPATH=/app
      # DATABASE_URL is loaded from .env.staging file (points to Supabase)
      # Redis for rate limiting (optional in staging)
      - RATE_LIMIT_STORAGE_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - RATE_LIMIT_ENABLED=True
      # Security
      - AUTH_BYPASS_ENABLED=False
      # Database SSL - explicit verification matching production behavior
      - DB_SSL_MODE=verify-full
      - DB_SSL_CA_CERT=/etc/ssl/certs/ca-certificates.crt
      # CORS - Set your staging frontend domain
      - CORS_ORIGINS=${CORS_ORIGINS:-https://staging.floodingnaque.vercel.app}
      # Logging
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      # Weather API Keys (from .env.staging)
      - OWM_API_KEY=${OWM_API_KEY}
      - WEATHERSTACK_API_KEY=${WEATHERSTACK_API_KEY:-}
      # Scheduler
      - SCHEDULER_ENABLED=True
      - SCHEDULER_TIMEZONE=Asia/Manila
      # Model integrity - checksum verification without requiring HMAC signature
      - VERIFY_MODEL_INTEGRITY=True
      - REQUIRE_MODEL_SIGNATURE=False
    env_file:
      - ./backend/.env.staging
    volumes:
      # Persistent data volumes (no code mounting in staging!)
      - floodingnaque_models_staging:/app/models
      - floodingnaque_logs_staging:/app/logs
      - floodingnaque_data_staging:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - floodingnaque-staging
    # Healthcheck - uses curl (installed in production image via Dockerfile)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Inherits logging, resources from compose.yaml

  # ===================
  # Redis (Rate Limiting & Cache)
  # ===================
  redis:
    image: redis:7.2-alpine
    container_name: floodingnaque-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data_staging:/data
    networks:
      - floodingnaque-staging
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ===================
  # Frontend (React SPA)
  # ===================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://staging-api.floodingnaque.com}
        VITE_APP_NAME: Floodingnaque
        VITE_ENABLE_SSE: "true"
    image: floodingnaque-frontend:staging
    container_name: floodingnaque-frontend-staging
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - floodingnaque-staging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ===================
  # Celery Worker (Background Tasks)
  # ===================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: floodingnaque-celery-staging
    restart: unless-stopped
    command: >
      celery -A app.services.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKERS:-2}
      --max-tasks-per-child=100
      --time-limit=300
      --soft-time-limit=240
    environment:
      - APP_ENV=staging
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/2
      - CELERY_TIMEZONE=Asia/Manila
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
    env_file:
      - ./backend/.env.staging
    volumes:
      - floodingnaque_models_staging:/app/models:ro
      - floodingnaque_data_staging:/app/data
      - floodingnaque_logs_staging:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - floodingnaque-staging
    healthcheck:
      test:
        ["CMD", "celery", "-A", "app.services.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ===================
  # Celery Beat (Task Scheduler)
  # ===================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: floodingnaque-celery-beat-staging
    restart: unless-stopped
    command: >
      celery -A app.services.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    environment:
      - APP_ENV=staging
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/2
      - CELERY_TIMEZONE=Asia/Manila
      - CELERY_BEAT_RUNNING=true
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
    env_file:
      - ./backend/.env.staging
    volumes:
      - floodingnaque_logs_staging:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - floodingnaque-staging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/celerybeat.pid && ps -p $(cat /tmp/celerybeat.pid) > /dev/null",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    tmpfs:
      - /tmp:size=50M,mode=1777
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ===================
  # Nginx Reverse Proxy (Optional for staging)
  # ===================
  # Use with: docker compose -f compose.staging.yaml --profile nginx up -d
  nginx:
    image: nginx:1.27-alpine
    container_name: floodingnaque-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/floodingnaque.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf_staging:/etc/letsencrypt:ro
      - certbot_www_staging:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - floodingnaque-staging
    profiles:
      - nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ===================
  # Certbot (Let's Encrypt for staging)
  # ===================
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: floodingnaque-certbot-staging
    volumes:
      - certbot_conf_staging:/etc/letsencrypt
      - certbot_www_staging:/var/www/certbot
    networks:
      - floodingnaque-staging
    profiles:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# ===================
# Networks
# ===================
networks:
  floodingnaque-staging:
    driver: bridge
    name: floodingnaque-staging

# ===================
# Volumes
# ===================
volumes:
  redis_data_staging:
    name: floodingnaque-redis-staging
  floodingnaque_models_staging:
    name: floodingnaque-models-staging
  floodingnaque_logs_staging:
    name: floodingnaque-logs-staging
  floodingnaque_data_staging:
    name: floodingnaque-data-staging
  certbot_conf_staging:
    name: floodingnaque-certbot-conf-staging
  certbot_www_staging:
    name: floodingnaque-certbot-www-staging
