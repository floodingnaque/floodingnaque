name: Performance

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5000

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: frontend/.lighthouserc.json
          budgetPath: frontend/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Post Lighthouse scores
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(
              fs.readFileSync('.lighthouseci/manifest.json', 'utf8')
            );
            const summary = results.map(r => {
              const s = JSON.parse(fs.readFileSync(r.jsonPath, 'utf8'));
              const cats = s.categories;
              return `| ${r.url} | ${Math.round(cats.performance.score * 100)} | ${Math.round(cats.accessibility.score * 100)} | ${Math.round((cats['best-practices']?.score ?? 0) * 100)} | ${Math.round(cats.seo.score * 100)} |`;
            }).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Lighthouse Results\n\n| URL | Perf | A11y | BP | SEO |\n|-----|------|------|----|-----|\n${summary}`
            });
