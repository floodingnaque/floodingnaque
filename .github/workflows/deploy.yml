name: Deploy

on:
  # Only deploy after CI workflow completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip_staging:
        description: "Skip staging and deploy directly to selected environment"
        required: false
        default: false
        type: boolean

# Set minimum permissions at workflow level (least privilege principle)
permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  STAGING_URL: https://staging-api.floodingnaque.com
  PRODUCTION_URL: https://api.floodingnaque.com

jobs:
  # ==========================================================================
  # CI Gate Check - abort if CI workflow failed
  # ==========================================================================
  ci-gate:
    name: CI Gate Check
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: CI passed
        run: echo "CI gate passed - proceeding with deployment"

  # ==========================================================================
  # Build and Push Docker Image
  # ==========================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set variables
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: vars.DOCKER_USERNAME_CONFIGURED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.workflow_run.head_commit.timestamp || '' }}
            GIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}

  # ==========================================================================
  # Security Scan Built Image
  # ==========================================================================
  scan-image:
    name: Scan Built Image
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      security-events: write # Required for uploading SARIF results

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          format: "sarif"
          output: "trivy-deploy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-deploy-results.sarif"

      - name: Check for critical vulnerabilities
        run: |
          # Parse SARIF and fail if CRITICAL vulnerabilities found
          if grep -q '"level": "error"' trivy-deploy-results.sarif 2>/dev/null; then
            echo "::error::Critical vulnerabilities found in container image!"
            exit 1
          fi

  # ==========================================================================
  # Deploy to Staging (Auto on main push)
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, scan-image]
    runs-on: ubuntu-latest
    # Skip staging if manual dispatch with skip_staging=true or direct production deploy
    if: |
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_staging != 'true')
    permissions:
      contents: read
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy to staging
        id: deploy
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_SSH_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
        run: |
          echo "🚀 Deploying to staging server..."
          echo "Image: $IMAGE_TAG"
          echo "Digest: $IMAGE_DIGEST"

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy via SSH with pre-deploy checks
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/floodingnaque

            echo "=== Pre-deploy checks ==="

            # W2: Verify .env file exists
            if [ ! -f ./backend/.env.staging ]; then
              echo "::error::backend/.env.staging not found on target server!"
              echo "Create it from backend/.env.example with staging values."
              exit 1
            fi

            # W3: Verify secrets directory (if using Docker Secrets)
            REQUIRED_SECRETS="secret_key.txt jwt_secret_key.txt database_url.txt redis_url.txt"
            if [ -d ./secrets ]; then
              for secret_file in $REQUIRED_SECRETS; do
                if [ ! -f ./secrets/$secret_file ]; then
                  echo "WARNING: Missing secret file: secrets/$secret_file"
                fi
              done
            fi

            echo "=== Pulling and deploying ==="
            docker compose -f compose.staging.yaml pull
            docker compose -f compose.staging.yaml up -d --remove-orphans

            # Run database migrations after containers are up
            echo "=== Running database migrations ==="
            docker compose -f compose.staging.yaml exec -T backend alembic upgrade head

            docker image prune -f
          DEPLOY_SCRIPT

          # Cleanup
          rm -f ~/.ssh/deploy_key
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Notify staging deployment
        if: success()
        run: |
          echo "::notice::✅ Successfully deployed to staging"

  # ==========================================================================
  # Smoke Tests on Staging
  # ==========================================================================
  smoke-test:
    name: Smoke Test Staging
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    if: needs.deploy-staging.outputs.deployed == 'true'
    env:
      STAGING_URL: https://staging-api.floodingnaque.com

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          echo "🔍 Running smoke tests on staging..."
          # Health endpoint check
          curl -f --retry 3 --retry-delay 10 $STAGING_URL/health || exit 1
          echo "✅ Health check passed"

      - name: Readiness check
        run: |
          # Readiness endpoint check
          curl -f --retry 3 --retry-delay 10 $STAGING_URL/health/ready || exit 1
          echo "✅ Readiness check passed"

      - name: API smoke test
        run: |
          # Basic API endpoint test
          response=$(curl -s -o /dev/null -w "%{http_code}" $STAGING_URL/api/v1/health)
          if [ "$response" != "200" ] && [ "$response" != "401" ]; then
            echo "::error::API smoke test failed with status $response"
            exit 1
          fi
          echo "✅ API smoke test passed (status: $response)"

      - name: Rollback staging on smoke failure
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_SSH_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "⚠️ Smoke test failed - rolling back staging to previous image..."
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << 'ROLLBACK'
            set -e
            cd /opt/floodingnaque
            # Docker keeps the previous image; rollback by reverting to it
            docker compose -f compose.staging.yaml up -d --force-recreate --remove-orphans
          ROLLBACK
          rm -f ~/.ssh/deploy_key
          echo "::warning::🔄 Staging auto-rolled back after smoke test failure"

  # ==========================================================================
  # Deploy to Production (Requires Manual Approval)
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    needs: [build-and-push, smoke-test]
    runs-on: ubuntu-latest
    # Only run on push to main (after staging succeeds) or manual dispatch to production
    if: |
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    permissions:
      contents: read
    environment:
      name: Production # Requires approval from Ramil-Martizano
      url: ${{ env.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy to production
        id: deploy
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
        run: |
          echo "🚀 Deploying to PRODUCTION server..."
          echo "Image: $IMAGE_TAG"
          echo "Digest: $IMAGE_DIGEST"

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy via SSH with pre-deploy checks and backup
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/floodingnaque

            echo "=== Pre-deploy checks ==="

            # W2: Verify .env.production exists
            if [ ! -f ./backend/.env.production ]; then
              echo "::error::backend/.env.production not found on target server!"
              echo "Create it from backend/.env.example with production values."
              echo "See docs/DOCKER_SECRETS_SETUP.md for required variables."
              exit 1
            fi

            # W3: Verify secrets directory and required secret files
            REQUIRED_SECRETS="secret_key.txt jwt_secret_key.txt database_url.txt redis_url.txt owm_api_key.txt model_signing_key.txt"
            MISSING=0
            for secret_file in $REQUIRED_SECRETS; do
              if [ ! -f ./secrets/$secret_file ]; then
                echo "ERROR: Missing required secret: secrets/$secret_file"
                MISSING=$((MISSING + 1))
              fi
            done
            if [ $MISSING -gt 0 ]; then
              echo "::error::$MISSING required secret files are missing!"
              echo "See docs/DOCKER_SECRETS_SETUP.md for setup instructions."
              exit 1
            fi

            # B2: Verify SSL CA certificate
            if [ ! -f ./backend/certs/prod-ca-2021.crt ]; then
              echo "::error::SSL CA certificate not found at backend/certs/prod-ca-2021.crt"
              echo "See backend/certs/README.md for setup instructions."
              exit 1
            fi

            # W4: Pre-deploy database backup
            echo "=== Creating pre-deploy database backup ==="
            docker compose -f compose.production.yaml exec -T backend \
              python -m scripts.backup_database --postgres --output /app/backups 2>&1 || \
              echo "WARNING: Pre-deploy backup failed - proceeding with caution"

            echo "=== Pulling and deploying ==="
            # W9: Always include --profile nginx for TLS termination in production
            docker compose -f compose.production.yaml --profile nginx pull
            docker compose -f compose.production.yaml --profile nginx up -d --remove-orphans

            # Run database migrations after containers are up
            echo "=== Running database migrations ==="
            docker compose -f compose.production.yaml exec -T backend alembic upgrade head

            docker image prune -f
          DEPLOY_SCRIPT

          # Cleanup
          rm -f ~/.ssh/deploy_key
          echo "url=${{ env.PRODUCTION_URL }}" >> $GITHUB_OUTPUT

      - name: Post-deploy health check
        run: |
          echo "🔍 Verifying production deployment..."
          sleep 30
          curl -f --retry 5 --retry-delay 15 ${{ env.PRODUCTION_URL }}/health || exit 1
          echo "✅ Production health check passed"

      - name: Notify production deployment
        if: success()
        run: |
          echo "::notice::🎉 Successfully deployed to PRODUCTION"
          echo "::notice::Image SHA: ${{ needs.build-and-push.outputs.short_sha }}"
