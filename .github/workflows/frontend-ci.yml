name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  # Allow ci.yml to call this workflow
  workflow_call:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ==========================================================================
  # Lint, Type-check & Build
  # ==========================================================================
  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npx vite build
        working-directory: frontend

      - name: Check bundle size (size-limit)
        run: npm run size:check
        working-directory: frontend

      - name: Check bundle size
        run: |
          MAX_SIZE_KB=250
          FAILED=0
          for f in dist/assets/*.js; do
            SIZE=$(gzip -c "$f" | wc -c)
            SIZE_KB=$((SIZE / 1024))
            echo "$(basename "$f"): ${SIZE_KB}KB gzipped"
            if [ "$SIZE_KB" -gt "$MAX_SIZE_KB" ]; then
              echo "::error::$(basename "$f") exceeds ${MAX_SIZE_KB}KB gzipped (${SIZE_KB}KB)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
        working-directory: frontend

  # ==========================================================================
  # Unit & Component Tests
  # ==========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: frontend

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ==========================================================================
  # End-to-End Tests (on PRs only)
  # ==========================================================================
  e2e:
    name: E2E Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --shard=${{ matrix.shard }}/2
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 14
