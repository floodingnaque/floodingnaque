name: "🏷️ Release & Changelog"

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ==========================================================================
  # Auto-Tag: Determine version from Conventional Commits and create tag
  # Only runs on push to main (NOT on tag pushes or workflow_dispatch)
  # ==========================================================================
  auto-tag:
    name: "📌 Auto-Tag"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')

    outputs:
      skip: ${{ steps.version.outputs.skip }}
      new_tag: ${{ steps.version.outputs.new_tag }}
      bump: ${{ steps.version.outputs.bump }}
      latest_tag: ${{ steps.version.outputs.latest_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${LATEST_TAG}"

          CURRENT=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          echo "Commits since ${LATEST_TAG}:"
          echo "$COMMITS"

          BUMP="none"
          while IFS= read -r commit; do
            if echo "$commit" | grep -qP "^(feat|fix|refactor|perf)!|BREAKING CHANGE"; then
              BUMP="major"
              break
            elif echo "$commit" | grep -qP "^feat(\(.+\))?:"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$commit" | grep -qP "^(fix|perf|refactor)(\(.+\))?:"; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          echo "Bump type: $BUMP"

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No releasable commits found — skipping release"
            exit 0
          fi

          case "$BUMP" in
            major) NEW_TAG="v$((MAJOR+1)).0.0" ;;
            minor) NEW_TAG="v${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac

          echo "skip=false"             >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}"     >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}"           >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_TAG}"

      - name: Bump version strings
        if: steps.version.outputs.skip == 'false'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"

          # pyproject.toml (root level)
          if [ -f pyproject.toml ]; then
            sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
            echo "✅ Bumped pyproject.toml to ${VERSION}"
          fi

          # frontend/package.json
          if [ -f frontend/package.json ]; then
            node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "✅ Bumped frontend/package.json to ${VERSION}"
          fi

          # backend/app/__init__.py (__version__ dunder)
          if [ -f backend/app/__init__.py ] && grep -q "^__version__" backend/app/__init__.py; then
            sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" backend/app/__init__.py
            echo "✅ Bumped backend/app/__init__.py to ${VERSION}"
          fi

      - name: Commit version bumps and create tag
        if: steps.version.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add pyproject.toml frontend/package.json backend/app/__init__.py 2>/dev/null || true
          git commit -m "chore(release): ${{ steps.version.outputs.new_tag }} [skip ci]" --allow-empty

          git tag -a "${{ steps.version.outputs.new_tag }}" \
            -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin HEAD:main --follow-tags

          echo "✅ Tag ${{ steps.version.outputs.new_tag }} created and pushed"

  # ==========================================================================
  # Generate Changelog (runs on tag push or workflow_dispatch)
  generate-changelog:
    name: "📝 Generate Changelog"
    runs-on: ubuntu-latest
    # Run on tag push or workflow_dispatch (skip if auto-tag determined no release)
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.skip != 'true')
    needs: [auto-tag]
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog generation
          persist-credentials: false

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: .github/cliff.toml
          args: --verbose --unreleased --tag ${{ steps.version.outputs.version }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Display changelog
        run: |
          echo "=== Generated Changelog ==="
          cat CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md
          retention-days: 30

  # ==========================================================================
  # Create GitHub Release
  # ==========================================================================
  create-release:
    name: "📦 Create GitHub Release"
    runs-on: ubuntu-latest
    needs: generate-changelog

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.generate-changelog.outputs.version }}
          name: Release ${{ needs.generate-changelog.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(needs.generate-changelog.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Update Changelog in Repository
  # ==========================================================================
  update-changelog:
    name: "📄 Update Repository Changelog"
    runs-on: ubuntu-latest
    needs: [generate-changelog, create-release]
    if: github.event_name == 'push' # Only on tag push, not manual

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Commit changelog update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Only commit if there are changes
          if git diff --quiet CHANGELOG.md 2>/dev/null; then
            echo "No changes to commit"
          else
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG for ${{ needs.generate-changelog.outputs.version }} [skip ci]"
            git push origin main
          fi
