name: "🔐 Security Scan"

on:
  # Called by CI workflow
  workflow_call:
    inputs:
      scan_type:
        description: "Scan type to run (all, pip-audit, bandit, safety)"
        required: false
        type: string
        default: "all"
      fail_on:
        description: "Fail on severity level (critical, high, medium, low)"
        required: false
        type: string
        default: "critical"
  # Run on every push and PR to main/develop
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  # Scheduled weekly security scans
  schedule:
    # Monday at 06:00 UTC (existing)
    - cron: "0 6 * * 1"
    # Sunday 00:00 PHT = Saturday 16:00 UTC (catch newly disclosed CVEs)
    - cron: "0 16 * * 6"
  # Manual trigger
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan type to run (all, pip-audit, bandit, safety)"
        required: false
        default: "all"
      fail_on:
        description: "Fail on severity level (critical, high, medium, low)"
        required: false
        default: "critical"

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # GitGuardian Secret Scanning
  # ===========================================================================
  ggshield-scan:
    name: "🔒 GitGuardian Secret Scan"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_call'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run ggshield secret scan
        uses: GitGuardian/ggshield-action@v1
        with:
          args: secret scan ci
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ===========================================================================
  # Gitleaks Secret Scanning (complements ggshield)
  # ===========================================================================
  gitleaks-scan:
    name: "🔑 Gitleaks Secret Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check for Floodingnaque-specific secrets
        run: |
          # Check for hardcoded OWM keys (format: 32 hex chars)
          if grep -rn "['\"][a-f0-9]\{32\}['\"]" \
              --include="*.py" --include="*.ts" --include="*.tsx" \
              --exclude-dir=".git" --exclude-dir="node_modules" .; then
            echo "❌ Possible hardcoded API key (32-char hex) found"
            exit 1
          fi

          # Check for hardcoded Supabase keys (eyJ prefix = JWT)
          if grep -rn "eyJ[A-Za-z0-9_-]\{50,\}" \
              --include="*.py" --include="*.ts" --include="*.tsx" \
              --exclude-dir=".git" --exclude-dir="node_modules" \
              --exclude="*.test.*" --exclude="*.spec.*" .; then
            echo "❌ Possible hardcoded JWT/Supabase key found"
            exit 1
          fi

          echo "✅ No Floodingnaque-specific secrets found"

  # ===========================================================================
  # Comprehensive Security Scan using security_scan.py
  # ===========================================================================
  security-scan:
    name: Comprehensive Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit safety
          pip install -r backend/requirements.txt

      - name: Create reports directory
        run: mkdir -p backend/reports/security

      - name: Run security scan script
        id: security_scan
        run: |
          cd backend
          python scripts/security_scan.py \
            --scan-type ${{ github.event.inputs.scan_type || 'all' }} \
            --output-format json \
            --output-dir reports/security \
            --ci \
            --fail-on ${{ github.event.inputs.fail_on || 'critical' }} \
            2>&1 | tee security-scan-output.txt
        continue-on-error: true

      - name: Display scan summary
        if: always()
        run: |
          echo "=== Security Scan Summary ==="
          cat backend/security-scan-output.txt || true
          echo ""
          echo "=== Generated Reports ==="
          ls -la backend/reports/security/ || echo "No reports generated"

      - name: Upload security scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-scan-results-${{ github.sha }}
          path: |
            backend/reports/security/
            backend/security-scan-output.txt
          retention-days: 90

      - name: Upload SARIF results (if available)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: backend/reports/security/
        continue-on-error: true

      - name: Check scan result
        if: steps.security_scan.outcome == 'failure'
        run: |
          echo "::error::Security scan found critical issues!"
          echo "Review the security-scan-results artifact for details."
          exit 1

  # ===========================================================================
  # Individual Security Tool Jobs (for parallel execution)
  # ===========================================================================
  pip-audit:
    name: pip-audit Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on requirements.txt
        id: pip_audit_main
        run: |
          cd backend
          pip-audit -r requirements.txt \
            --strict \
            --desc on \
            --format json \
            --output pip-audit-results.json \
            2>&1 | tee pip-audit-output.txt

      - name: Run pip-audit on dev requirements
        id: pip_audit_dev
        run: |
          cd backend
          pip-audit -r requirements-dev.txt \
            --desc on \
            --format json \
            --output pip-audit-dev-results.json \
            2>&1 | tee pip-audit-dev-output.txt || true
        continue-on-error: true

      - name: Display pip-audit summary
        if: always()
        run: |
          echo "=== pip-audit Results (requirements.txt) ==="
          cat backend/pip-audit-output.txt || true
          echo ""
          echo "=== pip-audit Results (requirements-dev.txt) ==="
          cat backend/pip-audit-dev-output.txt || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-results-${{ github.sha }}
          path: |
            backend/pip-audit-*.json
            backend/pip-audit-*.txt
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          cd backend
          # Parse JSON results and check for CRITICAL severity
          if [ -f pip-audit-results.json ]; then
            CRITICAL_COUNT=$(python -c "import json; d=json.load(open('pip-audit-results.json')); print(len([v for v in d.get('dependencies', []) if any(e.get('fix_versions') for e in v.get('vulns', []))]))" 2>/dev/null || echo "0")
            if [ "$CRITICAL_COUNT" -gt "0" ]; then
              echo "::warning::Found $CRITICAL_COUNT packages with known vulnerabilities"
            fi
          fi

  bandit:
    name: Bandit Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit on app code
        id: bandit_app
        run: |
          cd backend
          bandit -r app/ \
            -f json \
            -o bandit-app-results.json \
            --severity-level medium \
            --confidence-level medium \
            || true
          bandit -r app/ \
            -f txt \
            -o bandit-app-report.txt \
            --severity-level medium \
            --confidence-level medium \
            || true

      - name: Run Bandit on scripts
        id: bandit_scripts
        run: |
          cd backend
          bandit -r scripts/ \
            -f json \
            -o bandit-scripts-results.json \
            --severity-level medium \
            --confidence-level medium \
            || true

      - name: Display Bandit summary
        if: always()
        run: |
          echo "=== Bandit Results (app/) ==="
          cat backend/bandit-app-report.txt || echo "No issues found"

      - name: Upload Bandit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-results-${{ github.sha }}
          path: |
            backend/bandit-*.json
            backend/bandit-*.txt
          retention-days: 30

      - name: Check for high severity issues
        run: |
          cd backend
          ISSUES=$(bandit -r app/ -f json --severity-level high 2>/dev/null | python -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('results',[])))" 2>/dev/null || echo "0")
          if [ "$ISSUES" -gt "0" ]; then
            echo "::error::$ISSUES high-severity security issues found in app code!"
            bandit -r app/ -f txt --severity-level high
            exit 1
          fi
          echo "✓ No high-severity issues found"

  # ===========================================================================  # npm audit — Frontend Dependency Vulnerabilities
  # ===========================================================================
  npm-audit:
    name: "📦 npm Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      high_count: ${{ steps.audit.outputs.high }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --silent

      - name: Run npm audit
        id: audit
        working-directory: frontend
        run: |
          npm audit --audit-level=high --json > npm_audit.json 2>&1 || true

          HIGH=$(node -e "
          try {
            const d = require('./npm_audit.json');
            const vulns = d.metadata?.vulnerabilities || {};
            console.log((vulns.critical || 0) + (vulns.high || 0));
          } catch(e) { console.log(0); }
          ")
          echo "high=${HIGH}" >> "\$GITHUB_OUTPUT"

          node -e "
          try {
            const d = require('./npm_audit.json');
            const vulns = d.metadata?.vulnerabilities || {};
            console.log('npm audit summary:');
            console.log(\`  Critical: \${vulns.critical || 0}\`);
            console.log(\`  High:     \${vulns.high || 0}\`);
            console.log(\`  Moderate: \${vulns.moderate || 0}\`);
          } catch(e) {}
          "

          [ "$HIGH" -gt 0 ] && exit 1 || echo "✅ No critical/high npm CVEs"

      - name: Upload npm audit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-results-${{ github.sha }}
          path: frontend/npm_audit.json
          retention-days: 30

  # ===========================================================================
  # Semgrep — JavaScript/TypeScript SAST
  # ===========================================================================
  sast-frontend:
    name: "🔬 Semgrep JS/TS SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Semgrep
        uses: docker://semgrep/semgrep:latest
        with:
          args: >-
            semgrep scan
            --config p/javascript
            --config p/typescript
            --config p/react
            --sarif --output semgrep-results.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

  # ===========================================================================
  # Docker Image Vulnerability Scan (Trivy)
  # Runs on main/develop push only (image must be built first)
  # ===========================================================================
  docker-scan:
    name: "🐳 Docker Image Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build image for scanning
        run: |
          docker build \
            --target production \
            -t floodingnaque-scan:latest \
            -f backend/Dockerfile \
            ./backend

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "floodingnaque-scan:latest"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy
        continue-on-error: true

  # ===========================================================================  # Aggregate Security Report
  # ===========================================================================
  security-report:
    name: "📋 Security Report"
    runs-on: ubuntu-latest
    needs:
      [
        security-scan,
        ggshield-scan,
        gitleaks-scan,
        pip-audit,
        npm-audit,
        bandit,
        sast-frontend,
        docker-scan,
      ]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: security-artifacts

      - name: Generate aggregated report
        run: |
          echo "# 🔐 Floodingnaque Security Scan Report" > SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "**Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> SECURITY_REPORT.md
          echo "**Commit:** ${{ github.sha }}" >> SECURITY_REPORT.md
          echo "**Branch:** ${{ github.ref_name }}" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Scan Results Summary" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "| Scanner | Category | Status |" >> SECURITY_REPORT.md
          echo "|---------|----------|--------|" >> SECURITY_REPORT.md
          echo "| GitGuardian | Secrets | ${{ needs.ggshield-scan.result }} |" >> SECURITY_REPORT.md
          echo "| Gitleaks | Secrets | ${{ needs.gitleaks-scan.result }} |" >> SECURITY_REPORT.md
          echo "| Comprehensive Scan | SAST (Python) | ${{ needs.security-scan.result }} |" >> SECURITY_REPORT.md
          echo "| Bandit | SAST (Python) | ${{ needs.bandit.result }} |" >> SECURITY_REPORT.md
          echo "| Semgrep | SAST (JS/TS) | ${{ needs.sast-frontend.result }} |" >> SECURITY_REPORT.md
          echo "| pip-audit | Dependencies (Python) | ${{ needs.pip-audit.result }} |" >> SECURITY_REPORT.md
          echo "| npm audit | Dependencies (Frontend) | ${{ needs.npm-audit.result }} |" >> SECURITY_REPORT.md
          echo "| Trivy | Docker Image | ${{ needs.docker-scan.result }} |" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Artifacts" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "Detailed scan results are available in the workflow artifacts." >> SECURITY_REPORT.md

          cat SECURITY_REPORT.md

      - name: Upload aggregated report
        uses: actions/upload-artifact@v7
        with:
          name: security-report-${{ github.sha }}
          path: SECURITY_REPORT.md
          retention-days: 90

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('SECURITY_REPORT.md', 'utf8');

            // Delete previous security report comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' &&
                  c.body.includes('Floodingnaque Security Scan Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report,
            });
