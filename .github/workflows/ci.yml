name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Set minimum permissions at workflow level (least privilege principle)
permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Security Scanning (calls dedicated workflow)
  # ==========================================================================
  security-scan:
    name: Security Scan
    uses: ./.github/workflows/security-scan.yml
    secrets: inherit

  # ==========================================================================
  # Docker Compose Validation
  # ==========================================================================
  compose-validation:
    name: Validate Compose Files
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate base compose.yaml
      run: docker compose config > /dev/null
      env:
        POSTGRES_PASSWORD: validation-dummy
        PGBOUNCER_ADMIN_PASSWORD: validation-dummy
        PGBOUNCER_STATS_PASSWORD: validation-dummy

    - name: Validate compose.development.yaml
      run: docker compose -f compose.development.yaml config > /dev/null

    - name: Validate compose.staging.yaml
      run: docker compose -f compose.staging.yaml config > /dev/null
      env:
        OWM_API_KEY: validation-dummy

    - name: Validate compose.production.yaml
      run: docker compose -f compose.production.yaml config > /dev/null
      env:
        DD_API_KEY: validation-dummy
        PGBOUNCER_DB_PASSWORD: validation-dummy

    - name: Validate production with profiles
      run: docker compose -f compose.production.yaml --profile nginx --profile monitoring config > /dev/null
      env:
        DD_API_KEY: validation-dummy
        PGBOUNCER_DB_PASSWORD: validation-dummy

    - name: Validate compose.mlflow.yaml
      run: docker compose -f compose.mlflow.yaml config > /dev/null

  # ==========================================================================
  # Container Image Security Scanning with Trivy
  # ==========================================================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for uploading SARIF results

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        target: production
        push: false
        load: true
        tags: floodingnaque-api:scan-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: 'floodingnaque-api:scan-${{ github.sha }}'
        format: 'table'
        exit-code: '0'  # Don't fail build, report only
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        output: 'trivy-results.txt'

    - name: Run Trivy scanner (SARIF output)
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: 'floodingnaque-api:scan-${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Display Trivy scan results
      if: always()
      run: |
        echo "=== Trivy Scan Results ==="
        cat trivy-results.txt || echo "No results file found"

    - name: Check for critical vulnerabilities
      run: |
        # Fail if CRITICAL vulnerabilities found
        if grep -q "CRITICAL" trivy-results.txt 2>/dev/null; then
          echo "::error::Critical vulnerabilities found in container image!"
          exit 1
        fi
      continue-on-error: false  # Enforce blocking on critical vulnerabilities

  # ==========================================================================
  # Code Quality & Testing
  # ==========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Tests run independently - no dependency on security scans
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: backend/requirements*.txt

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        cd backend
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Type check with mypy
      run: |
        cd backend
        # Uses mypy.ini configuration for consistent type checking
        mypy --config-file mypy.ini
      continue-on-error: true  # Set to false once type coverage is improved

    - name: Test with pytest
      run: |
        cd backend
        python -m pytest tests/unit tests/integration -v -m "not model" --cov=app --cov-branch --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      continue-on-error: true
      with:
        files: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  # ==========================================================================
  # Load Testing (Smoke Test for PRs)
  # ==========================================================================
  load-test:
    name: Load Test (Smoke)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements*.txt

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust pytest

    - name: Start API server
      run: |
        cd backend
        python -m gunicorn main:app --bind 0.0.0.0:5000 --workers 2 --timeout 60 &
        # Wait for server to be ready with health poll (max 60 seconds)
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5000/status > /dev/null 2>&1; then
            echo "Server is ready after $((i * 2)) seconds"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Server failed to start within 60 seconds"
            exit 1
          fi
          sleep 2
        done

    - name: Run smoke test
      run: |
        cd backend
        python -m tests.load.load_test_suite --test-type smoke --host http://localhost:5000 --ci

    - name: Upload load test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: load-test-report
        path: backend/reports/load_tests/
        retention-days: 14

  # ==========================================================================
  # Full Load Test Suite (On main branch only)
  # ==========================================================================
  load-test-full:
    name: Full Load Test Suite
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements*.txt

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust pytest

    - name: Start API server
      run: |
        cd backend
        python -m gunicorn main:app --bind 0.0.0.0:5000 --workers 4 --timeout 120 &
        # Wait for server to be ready with health poll (max 60 seconds)
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5000/status > /dev/null 2>&1; then
            echo "Server is ready after $((i * 2)) seconds"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Server failed to start within 60 seconds"
            exit 1
          fi
          sleep 2
        done

    - name: Run load test
      run: |
        cd backend
        python -m tests.load.load_test_suite --test-type load --host http://localhost:5000 --ci

    - name: Upload load test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: full-load-test-report
        path: backend/reports/load_tests/
        retention-days: 30
