name: Reusable Python Setup

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'
      working-directory:
        description: 'Working directory for the setup'
        required: false
        type: string
        default: 'backend'
      install-dev-deps:
        description: 'Whether to install dev dependencies'
        required: false
        type: boolean
        default: true
      extra-packages:
        description: 'Additional pip packages to install (space-separated)'
        required: false
        type: string
        default: ''

jobs:
  setup:
    name: Python Setup
    runs-on: ubuntu-latest
    
    outputs:
      python-version: ${{ inputs.python-version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.working-directory }}/requirements*.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install main dependencies
        run: |
          cd ${{ inputs.working-directory }}
          pip install -r requirements.txt

      - name: Install dev dependencies
        if: inputs.install-dev-deps
        run: |
          cd ${{ inputs.working-directory }}
          pip install -r requirements-dev.txt

      - name: Install extra packages
        if: inputs.extra-packages != ''
        run: pip install ${{ inputs.extra-packages }}
