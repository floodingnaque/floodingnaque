# =====================================================
# Floodingnaque - Production Docker Compose
# =====================================================
# Usage:
#   docker compose -f compose.production.yaml up -d --build
#   docker compose -f compose.production.yaml logs -f
#   docker compose -f compose.production.yaml down
#
# With Nginx (for VPS with TLS termination):
#   docker compose -f compose.production.yaml --profile nginx up -d --build
#
# With Prometheus monitoring:
#   docker compose -f compose.production.yaml --profile monitoring up -d
#
# With both Nginx and monitoring:
#   docker compose -f compose.production.yaml --profile nginx --profile monitoring up -d
#
# With Docker Secrets (RECOMMENDED for production):
#   1. Create secrets directory: mkdir -p ./secrets
#   2. Create secret files (see docs/DOCKER_SECRETS_SETUP.md)
#   3. Run: docker compose -f compose.production.yaml --profile secrets up -d
# =====================================================
# NOTE: This configuration uses:
#   - Supabase PostgreSQL for database
#   - Redis Cloud (Azure West US) for caching, rate limiting, and Celery
#   - Datadog Agent for APM and infrastructure monitoring
#   - Nginx reverse proxy with Let's Encrypt (optional, use --profile nginx)
#   Ensure .env.production is properly configured with DD_API_KEY.
#
# This file inherits shared anchors from compose.yaml via include directive.
# Requires Docker Compose v2.20+
# =====================================================
# SECURITY NOTES:
#   - Backend port bound to localhost (127.0.0.1:5000) - only accessible via Nginx
#   - Network segmentation: frontend, backend, monitoring networks
#   - All containers run with no-new-privileges security option
#   - Docker Secrets with _FILE pattern - secrets mounted at /run/secrets/
#   - See docs/DOCKER_SECRETS_SETUP.md for secrets configuration
# =====================================================

include:
  - compose.yaml

name: floodingnaque-prod

# ===================
# YAML Anchors for Production
# ===================
# Note: YAML anchors cannot be shared via include directive, so we define
# production-specific anchors here. The backend service inherits from compose.yaml.

x-backend-healthcheck: &backend-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-logging-default: &logging-default
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-logging-production: &logging-production
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

x-resources-small: &resources-small
  limits:
    cpus: '0.5'
    memory: 512M
  reservations:
    cpus: '0.1'
    memory: 128M

x-resources-large: &resources-large
  limits:
    cpus: '2'
    memory: 2G
  reservations:
    cpus: '0.5'
    memory: 512M

x-security-opts: &security-opts
  security_opt:
    - no-new-privileges:true

# ===================
# Docker Secrets Top-Level Definition
# ===================
# File-based secrets for docker compose (non-Swarm mode)
# These are mounted at /run/secrets/<secret_name> in containers
# See docs/DOCKER_SECRETS_SETUP.md for setup instructions
secrets:
  secret_key:
    file: ./secrets/secret_key.txt
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  database_url:
    file: ./secrets/database_url.txt
  redis_url:
    file: ./secrets/redis_url.txt
  dd_api_key:
    file: ./secrets/dd_api_key.txt
  owm_api_key:
    file: ./secrets/owm_api_key.txt
  pgbouncer_db_password:
    file: ./secrets/pgbouncer_db_password.txt
  pgbouncer_admin_password:
    file: ./secrets/pgbouncer_admin_password.txt
  pgbouncer_stats_password:
    file: ./secrets/pgbouncer_stats_password.txt
  model_signing_key:
    file: ./secrets/model_signing_key.txt

services:
  # ===================
  # Backend API Service
  # ===================
  backend:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.12"
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-api-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "api"
      com.floodingnaque.description: "Flood Prediction API"
      com.floodingnaque.version: "2.0.0"
    ports:
      # Bind to localhost only - Nginx reverse proxy handles external traffic
      - "127.0.0.1:5000:5000"
    environment:
      # Application
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PORT=5000
      - HOST=0.0.0.0
      - PYTHONPATH=/app

      # Security
      - AUTH_BYPASS_ENABLED=False
      - ENABLE_HTTPS=True
      - VERIFY_MODEL_INTEGRITY=True
      - REQUIRE_MODEL_SIGNATURE=True

      # Database SSL Configuration (verify-full for production)
      - DB_SSL_MODE=verify-full
      - DB_SSL_CA_CERT=/app/certs/prod-ca-2021.crt

      # Redis Cloud connections (loaded from .env.production)
      # REDIS_URL, CACHE_REDIS_URL, RATELIMIT_STORAGE_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND
      # are configured in .env.production pointing to Redis Cloud

      # Rate limiting
      - RATE_LIMIT_ENABLED=True
      - RATE_LIMIT_DEFAULT=100
      - RATE_LIMIT_WINDOW_SECONDS=3600

      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-https://floodingnaque.vercel.app,https://www.floodingnaque.com}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      - LOG_FILE=/app/logs/floodingnaque.log

      # Features
      - FEATURE_SCHEDULER_ENABLED=True
      - FEATURE_METRICS_ENABLED=True
      - FEATURE_API_DOCS_ENABLED=False
      - GRAPHQL_PLAYGROUND_ENABLED=False
      - GRAPHQL_INTROSPECTION_ENABLED=False

      # Scheduler
      - SCHEDULER_ENABLED=True
      - SCHEDULER_TIMEZONE=Asia/Manila

      # Gunicorn
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=120
      - GUNICORN_WORKER_CLASS=sync
      - GUNICORN_MAX_REQUESTS=1000
      - GUNICORN_MAX_REQUESTS_JITTER=50

      # Performance
      - DB_POOL_SIZE=20
      - DB_MAX_OVERFLOW=10
      - CACHE_DEFAULT_TIMEOUT=300

      # Datadog APM
      - DD_ENV=production
      - DD_SERVICE=floodingnaque-api
      - DD_VERSION=2.0.0
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket

      # Docker Secrets _FILE references (when using --profile secrets)
      # These override the env_file values with file-based secrets
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_secret_key
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - DD_API_KEY_FILE=/run/secrets/dd_api_key
      - OWM_API_KEY_FILE=/run/secrets/owm_api_key
      - MODEL_SIGNING_KEY_FILE=/run/secrets/model_signing_key

    secrets:
      - secret_key
      - jwt_secret_key
      - database_url
      - redis_url
      - dd_api_key
      - owm_api_key
      - model_signing_key
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_models_prod:/app/models
      - floodingnaque_logs_prod:/app/logs
      - floodingnaque_data_prod:/app/data
      - floodingnaque_uploads_prod:/app/uploads
      - floodingnaque_backups_prod:/app/backups
      - /var/run/datadog:/var/run/datadog
      # SSL certificate for database connection (mount at runtime for security)
      - ./backend/certs/prod-ca-2021.crt:/app/certs/prod-ca-2021.crt:ro
    depends_on:
      datadog-agent:
        condition: service_started
        required: false
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    healthcheck:
      <<: *backend-healthcheck
    deploy:
      resources:
        <<: *resources-large
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      <<: *logging-production
    <<: *security-opts
    read_only: true
    tmpfs:
      - /tmp:size=200M,mode=1777
      - /app/.cache:size=100M,mode=1777

  # ===================
  # Celery Worker
  # ===================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.12"
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-celery-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "celery-worker"
      com.floodingnaque.description: "Background Task Worker"
      com.floodingnaque.version: "2.0.0"
    command: >
      celery -A app.services.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKERS:-2}
      --max-tasks-per-child=100
      --time-limit=300
      --soft-time-limit=240
    environment:
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      # Celery config loaded from .env.production (Redis Cloud)
      - CELERY_TASK_SERIALIZER=json
      - CELERY_RESULT_SERIALIZER=json
      - CELERY_ACCEPT_CONTENT=json
      - CELERY_TIMEZONE=Asia/Manila
      - CELERY_ENABLE_UTC=True
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Datadog APM
      - DD_ENV=production
      - DD_SERVICE=floodingnaque-celery-worker
      - DD_VERSION=2.0.0
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      # Docker Secrets _FILE references
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - SECRET_KEY_FILE=/run/secrets/secret_key
    secrets:
      - database_url
      - redis_url
      - secret_key
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_models_prod:/app/models:ro
      - floodingnaque_data_prod:/app/data
      - floodingnaque_logs_prod:/app/logs
      - /var/run/datadog:/var/run/datadog
    depends_on:
      backend:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy
        required: false
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    healthcheck:
      test: ["CMD", "celery", "-A", "app.services.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    logging:
      <<: *logging-production
    <<: *security-opts

  # ===================
  # Celery Beat
  # ===================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.12"
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-celery-beat-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "celery-beat"
      com.floodingnaque.description: "Task Scheduler"
      com.floodingnaque.version: "2.0.0"
    command: >
      celery -A app.services.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    environment:
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      # Celery config loaded from .env.production (Redis Cloud)
      - CELERY_TIMEZONE=Asia/Manila
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Datadog APM
      - DD_ENV=production
      - DD_SERVICE=floodingnaque-celery-beat
      - DD_VERSION=2.0.0
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      # Docker Secrets _FILE references
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
    secrets:
      - database_url
      - redis_url
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_logs_prod:/app/logs
      - /var/run/datadog:/var/run/datadog
    depends_on:
      backend:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy
        required: false
    networks:
      - floodingnaque-backend
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && ps -p $(cat /tmp/celerybeat.pid) > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        <<: *resources-small
    logging:
      <<: *logging-default
    <<: *security-opts
    tmpfs:
      - /tmp:size=50M,mode=1777

  # ===================
  # PgBouncer Connection Pooler
  # ===================
  # Use with: --profile pgbouncer
  # Provides connection pooling for PostgreSQL
  pgbouncer:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    image: floodingnaque-pgbouncer:1.21.0
    container_name: floodingnaque-pgbouncer-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "pgbouncer"
      com.floodingnaque.description: "PostgreSQL Connection Pooler"
      com.floodingnaque.version: "1.21.0"
    ports:
      - "127.0.0.1:6432:6432"
    environment:
      # Database connection (from .env.production)
      - DB_HOST=${PGBOUNCER_DB_HOST:-db.your-project-ref.supabase.co}
      - DB_PORT=${PGBOUNCER_DB_PORT:-5432}
      - DB_NAME=${PGBOUNCER_DB_NAME:-postgres}
      - DB_USER=${PGBOUNCER_DB_USER:-postgres}
      - DB_PASSWORD=${PGBOUNCER_DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE:-verify-full}
      # Read replica (optional)
      - DB_REPLICA_HOST=${DB_REPLICA_HOST:-}
      - DB_REPLICA_PORT=${DB_REPLICA_PORT:-5432}
      # Pool settings
      - PGBOUNCER_POOL_MODE=${PGBOUNCER_POOL_MODE:-transaction}
      - PGBOUNCER_MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-1000}
      - PGBOUNCER_DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      - PGBOUNCER_MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE:-5}
      - PGBOUNCER_RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-10}
      - PGBOUNCER_MAX_DB_CONNECTIONS=${PGBOUNCER_MAX_DB_CONNECTIONS:-50}
      # Admin credentials
      - PGBOUNCER_ADMIN_USER=${PGBOUNCER_ADMIN_USER:-pgbouncer_admin}
      - PGBOUNCER_ADMIN_PASSWORD=${PGBOUNCER_ADMIN_PASSWORD}
      - PGBOUNCER_STATS_USER=${PGBOUNCER_STATS_USER:-pgbouncer_stats}
      - PGBOUNCER_STATS_PASSWORD=${PGBOUNCER_STATS_PASSWORD}
      # Docker Secrets _FILE references
      - DB_PASSWORD_FILE=/run/secrets/pgbouncer_db_password
      - PGBOUNCER_ADMIN_PASSWORD_FILE=/run/secrets/pgbouncer_admin_password
      - PGBOUNCER_STATS_PASSWORD_FILE=/run/secrets/pgbouncer_stats_password
    secrets:
      - pgbouncer_db_password
      - pgbouncer_admin_password
      - pgbouncer_stats_password
    networks:
      - floodingnaque-backend
    profiles:
      - pgbouncer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Datadog Agent
  # ===================
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: floodingnaque-datadog-agent
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "datadog-agent"
      com.floodingnaque.description: "APM and Monitoring Agent"
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=us5.datadoghq.com
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_APM_RECEIVER_SOCKET=/var/run/datadog/apm.socket
      - DD_DOGSTATSD_SOCKET=/var/run/datadog/dsd.socket
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE="name:datadog-agent"
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_ENV=production
      - DD_TAGS=project:floodingnaque,team:backend
      # Docker Secrets _FILE reference
      - DD_API_KEY_FILE=/run/secrets/dd_api_key
    secrets:
      - dd_api_key
    volumes:
      - /var/run/datadog:/var/run/datadog
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    healthcheck:
      test: ["CMD", "agent", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Prometheus Monitoring
  # ===================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: floodingnaque-prometheus-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "prometheus"
      com.floodingnaque.description: "Metrics Collection"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    networks:
      - floodingnaque-monitoring
      - floodingnaque-backend
    depends_on:
      - backend
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        <<: *resources-small
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Nginx Reverse Proxy (TLS Termination)
  # ===================
  # Use with: --profile nginx
  nginx:
    image: nginx:1.25-alpine
    container_name: floodingnaque-nginx-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "nginx"
      com.floodingnaque.description: "Reverse Proxy with TLS"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/floodingnaque.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf_prod:/etc/letsencrypt:ro
      - certbot_www_prod:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - floodingnaque-frontend
      - floodingnaque-backend
    profiles:
      - nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Certbot (Let's Encrypt)
  # ===================
  # Use with: --profile nginx
  # Initial certificate:
  #   docker compose -f compose.production.yaml --profile nginx run --rm certbot \
  #     certonly --webroot -w /var/www/certbot -d api.floodingnaque.com --email your@email.com --agree-tos
  # Manual renewal:
  #   docker compose -f compose.production.yaml --profile nginx run --rm certbot renew
  certbot:
    image: certbot/certbot:latest
    container_name: floodingnaque-certbot-prod
    volumes:
      - certbot_conf_prod:/etc/letsencrypt
      - certbot_www_prod:/var/www/certbot
    networks:
      - floodingnaque-frontend
    profiles:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      <<: *logging-default

# ===================
# Networks (Segmented for Security)
# ===================
networks:
  # Frontend network - Nginx and external-facing services
  floodingnaque-frontend:
    driver: bridge
    name: floodingnaque-frontend-production
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"

  # Backend network - API, Celery workers, and internal services
  floodingnaque-backend:
    driver: bridge
    name: floodingnaque-backend-production
    internal: false  # Set to true if no external access needed
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"

  # Monitoring network - Prometheus, Datadog, and observability tools
  floodingnaque-monitoring:
    driver: bridge
    name: floodingnaque-monitoring-production
