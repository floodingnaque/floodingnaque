# =====================================================
# Floodingnaque - Production Docker Compose
# =====================================================
# Usage:
#   docker compose -f compose.production.yaml up -d --build
#   docker compose -f compose.production.yaml logs -f
#   docker compose -f compose.production.yaml down
#
# With Nginx (for VPS with TLS termination):
#   docker compose -f compose.production.yaml --profile nginx up -d --build
#
# With Prometheus monitoring:
#   docker compose -f compose.production.yaml --profile monitoring up -d
#
# With both Nginx and monitoring:
#   docker compose -f compose.production.yaml --profile nginx --profile monitoring up -d
#
# With Docker Secrets (RECOMMENDED for production):
#   1. Create secrets directory: mkdir -p ./secrets
#   2. Create secret files (see docs/DOCKER_SECRETS_SETUP.md)
#   3. Run: docker compose -f compose.production.yaml --profile secrets up -d
# =====================================================
# NOTE: This configuration uses:
#   - Supabase PostgreSQL for database
#   - Redis Cloud (Azure West US) for caching, rate limiting, and Celery
#   - Nginx reverse proxy with Let's Encrypt (optional, use --profile nginx)
#   - Prometheus + Grafana + Jaeger for observability (compose.observability.yaml)
#
# This file inherits shared anchors from compose.yaml via include directive.
# Requires Docker Compose v2.20+
# =====================================================
# SECURITY NOTES:
#   - Backend port bound to localhost (127.0.0.1:5000) - only accessible via Nginx
#   - Network segmentation: frontend, backend, monitoring networks
#   - All containers run with no-new-privileges security option
#   - Docker Secrets with _FILE pattern - secrets mounted at /run/secrets/
#   - See docs/DOCKER_SECRETS_SETUP.md for secrets configuration
# =====================================================

include:
  - compose.yaml

name: floodingnaque-prod

# ===================
# YAML Anchors for Production
# ===================
# Note: YAML anchors cannot be shared via include directive, so we define
# production-specific anchors here. The backend service inherits from compose.yaml.

x-backend-healthcheck: &backend-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-logging-default: &logging-default
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-logging-production: &logging-production
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

x-resources-small: &resources-small
  limits:
    cpus: "0.5"
    memory: 512M
  reservations:
    cpus: "0.1"
    memory: 128M

x-resources-large: &resources-large
  limits:
    cpus: "2"
    memory: 2G
  reservations:
    cpus: "0.5"
    memory: 512M

x-security-opts: &security-opts
  security_opt:
    - no-new-privileges:true

# ===================
# Docker Secrets Top-Level Definition
# ===================
# File-based secrets for docker compose (non-Swarm mode)
# These are mounted at /run/secrets/<secret_name> in containers
# See docs/DOCKER_SECRETS_SETUP.md for setup instructions
secrets:
  secret_key:
    file: ./secrets/secret_key.txt
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  database_url:
    file: ./secrets/database_url.txt
  redis_url:
    file: ./secrets/redis_url.txt
  owm_api_key:
    file: ./secrets/owm_api_key.txt
  pgbouncer_db_password:
    file: ./secrets/pgbouncer_db_password.txt
  pgbouncer_admin_password:
    file: ./secrets/pgbouncer_admin_password.txt
  pgbouncer_stats_password:
    file: ./secrets/pgbouncer_stats_password.txt
  model_signing_key:
    file: ./secrets/model_signing_key.txt

services:
  # ===================
  # Backend API Service
  # ===================
  backend:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.13"
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-api-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "api"
      com.floodingnaque.description: "Flood Prediction API"
      com.floodingnaque.version: "2.0.0"
    ports:
      # Bind to localhost only - Nginx reverse proxy handles external traffic
      - "127.0.0.1:5000:5000"
    environment:
      # Application
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PORT=5000
      - HOST=0.0.0.0
      - PYTHONPATH=/app

      # Security
      - AUTH_BYPASS_ENABLED=False
      - ENABLE_HTTPS=True
      - VERIFY_MODEL_INTEGRITY=True
      - REQUIRE_MODEL_SIGNATURE=True

      # Database SSL Configuration (verify-full for production)
      - DB_SSL_MODE=verify-full
      - DB_SSL_CA_CERT=/app/certs/prod-ca-2021.crt

      # Redis Cloud connections (loaded from .env.production)
      # REDIS_URL, CACHE_REDIS_URL, RATELIMIT_STORAGE_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND
      # are configured in .env.production pointing to Redis Cloud

      # Rate limiting
      - RATE_LIMIT_ENABLED=True
      - RATE_LIMIT_DEFAULT=100
      - RATE_LIMIT_WINDOW_SECONDS=3600

      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-https://floodingnaque.vercel.app,https://www.floodingnaque.com}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      - LOG_FILE=/app/logs/floodingnaque.log

      # Features
      - FEATURE_SCHEDULER_ENABLED=True
      - FEATURE_METRICS_ENABLED=True
      - FEATURE_API_DOCS_ENABLED=False
      - GRAPHQL_PLAYGROUND_ENABLED=False
      - GRAPHQL_INTROSPECTION_ENABLED=False

      # Data provenance enforcement
      - DATA_PROVENANCE_ENABLED=true
      - SYNTHETIC_DATA_ALLOWED=false
      - MODEL_METADATA_VALIDATION=strict

      # Scheduler
      - SCHEDULER_ENABLED=True
      - SCHEDULER_TIMEZONE=Asia/Manila

      # Gunicorn
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=120
      - GUNICORN_WORKER_CLASS=sync
      - GUNICORN_MAX_REQUESTS=5000
      - GUNICORN_MAX_REQUESTS_JITTER=200

      # Performance
      - DB_POOL_SIZE=20
      - DB_MAX_OVERFLOW=10
      - CACHE_DEFAULT_TIMEOUT=300

      # Docker Secrets _FILE references (when using --profile secrets)
      # These override the env_file values with file-based secrets
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_secret_key
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - OWM_API_KEY_FILE=/run/secrets/owm_api_key
      - MODEL_SIGNING_KEY_FILE=/run/secrets/model_signing_key

    secrets:
      - secret_key
      - jwt_secret_key
      - database_url
      - redis_url
      - owm_api_key
      - model_signing_key
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_models_prod:/app/models
      - floodingnaque_logs_prod:/app/logs
      - floodingnaque_data_prod:/app/data:ro
      - floodingnaque_uploads_prod:/app/uploads
      - floodingnaque_backups_prod:/app/backups
      # SSL certificate for database connection (mount at runtime for security)
      - ./backend/certs/prod-ca-2021.crt:/app/certs/prod-ca-2021.crt:ro
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    healthcheck:
      <<: *backend-healthcheck
    deploy:
      resources:
        <<: *resources-large
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      <<: *logging-production
    <<: *security-opts
    # Filesystem hardening \u2014 container runs read-only except:
    #   Writable volumes: /app/models, /app/logs, /app/data, /app/uploads, /app/backups
    #   Writable tmpfs:   /tmp (200M), /app/.cache (100M)
    # NOTE: Dev/staging do NOT enforce read-only. Any code writing outside
    # these paths will silently work in dev but fail in production.
    read_only: true
    tmpfs:
      - /tmp:size=200M,mode=1777
      - /app/.cache:size=100M,mode=1777

  # ===================
  # Backend Canary Service
  # ===================
  # Deploy with: --profile canary
  # Receives a % of traffic (configured in nginx split_clients).
  # Shares volumes/secrets with production but runs a different image tag.
  backend-canary:
    extends:
      file: compose.yaml
      service: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.13"
    image: floodingnaque-api:canary
    container_name: floodingnaque-api-canary
    restart: always
    labels:
      com.floodingnaque.service: "api-canary"
      com.floodingnaque.description: "Flood Prediction API (Canary)"
    ports: []
    environment:
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PORT=5000
      - HOST=0.0.0.0
      - PYTHONPATH=/app
      - AUTH_BYPASS_ENABLED=False
      - ENABLE_HTTPS=True
      - VERIFY_MODEL_INTEGRITY=True
      - RATE_LIMIT_ENABLED=True
      - CORS_ORIGINS=${CORS_ORIGINS:-https://floodingnaque.vercel.app,https://www.floodingnaque.com}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json
      - FEATURE_SCHEDULER_ENABLED=False
      - FEATURE_METRICS_ENABLED=True
      - SCHEDULER_ENABLED=False
      - GUNICORN_WORKERS=2
      - GUNICORN_THREADS=2
      - GUNICORN_TIMEOUT=120
      - DB_POOL_SIZE=5
      - DB_MAX_OVERFLOW=3
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_secret_key
      - MODEL_SIGNING_KEY_FILE=/run/secrets/model_signing_key
    secrets:
      - secret_key
      - jwt_secret_key
      - database_url
      - redis_url
      - model_signing_key
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_models_prod:/app/models:ro
      - floodingnaque_logs_prod:/app/logs
      - floodingnaque_data_prod:/app/data:ro
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    healthcheck:
      <<: *backend-healthcheck
    deploy:
      resources:
        <<: *resources-small
    logging:
      <<: *logging-production
    <<: *security-opts
    profiles:
      - canary

  # ===================
  # Celery Worker
  # ===================
  celery-worker:
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-celery-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "celery-worker"
      com.floodingnaque.description: "Background Task Worker"
      com.floodingnaque.version: "2.0.0"
    command: >
      celery -A app.services.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKERS:-2}
      --max-tasks-per-child=100
      --time-limit=300
      --soft-time-limit=240
    environment:
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      # Celery config loaded from .env.production (Redis Cloud)
      - CELERY_TASK_SERIALIZER=json
      - CELERY_RESULT_SERIALIZER=json
      - CELERY_ACCEPT_CONTENT=json
      - CELERY_TIMEZONE=Asia/Manila
      - CELERY_ENABLE_UTC=True
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Docker Secrets _FILE references
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - SECRET_KEY_FILE=/run/secrets/secret_key
    secrets:
      - database_url
      - redis_url
      - secret_key
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_models_prod:/app/models:ro
      - floodingnaque_data_prod:/app/data
      - floodingnaque_logs_prod:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    healthcheck:
      test:
        ["CMD", "celery", "-A", "app.services.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    logging:
      <<: *logging-production
    <<: *security-opts

  # ===================
  # Celery Beat
  # ===================
  celery-beat:
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-celery-beat-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "celery-beat"
      com.floodingnaque.description: "Task Scheduler"
      com.floodingnaque.version: "2.0.0"
    command: >
      celery -A app.services.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    environment:
      - APP_ENV=production
      - FLASK_DEBUG=False
      - PYTHONPATH=/app
      # Celery config loaded from .env.production (Redis Cloud)
      - CELERY_TIMEZONE=Asia/Manila
      - CELERY_BEAT_RUNNING=true
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Docker Secrets _FILE references
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
    secrets:
      - database_url
      - redis_url
    env_file:
      - ./backend/.env.production
    volumes:
      - floodingnaque_logs_prod:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - floodingnaque-backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/celerybeat.pid && ps -p $(cat /tmp/celerybeat.pid) > /dev/null",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        <<: *resources-small
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    logging:
      <<: *logging-default
    <<: *security-opts
    tmpfs:
      - /tmp:size=50M,mode=1777

  # ===================
  # Frontend (React SPA)
  # ===================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.floodingnaque.com}
        VITE_APP_NAME: Floodingnaque
        VITE_ENABLE_SSE: "true"
    image: floodingnaque-frontend:production-v2.0.0
    container_name: floodingnaque-frontend-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "frontend"
      com.floodingnaque.description: "Flood Prediction Frontend"
      com.floodingnaque.version: "2.0.0"
    networks:
      - floodingnaque-frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Offsite Backup Sync (W6)
  # ===================
  # Syncs local backups to S3-compatible storage for disaster recovery.
  # Use with: --profile backup-offsite
  #
  # Required environment variables (in .env.production):
  #   BACKUP_S3_BUCKET        - S3 bucket name
  #   BACKUP_S3_PREFIX        - Key prefix (default: floodingnaque/db/)
  #   AWS_ACCESS_KEY_ID       - AWS/S3-compatible credentials
  #   AWS_SECRET_ACCESS_KEY   - AWS/S3-compatible credentials
  #   AWS_DEFAULT_REGION      - AWS region (default: ap-southeast-1)
  #   S3_ENDPOINT_URL         - Custom S3 endpoint (for MinIO, Backblaze B2, etc.)
  backup-offsite:
    image: amazon/aws-cli:2.15.17
    container_name: floodingnaque-backup-offsite
    restart: "no"
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.service: "backup-offsite"
      com.floodingnaque.description: "Offsite Backup Sync to S3"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "=== Syncing backups to S3 ==="
        ENDPOINT_FLAG=""
        if [ -n "$${S3_ENDPOINT_URL}" ]; then
          ENDPOINT_FLAG="--endpoint-url $${S3_ENDPOINT_URL}"
        fi
        aws s3 sync /backups/ \
          s3://$${BACKUP_S3_BUCKET}/$${BACKUP_S3_PREFIX:-floodingnaque/db/} \
          $$ENDPOINT_FLAG \
          --storage-class STANDARD_IA \
          --only-show-errors
        echo "=== Offsite sync complete ==="
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-southeast-1}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_PREFIX=${BACKUP_S3_PREFIX:-floodingnaque/db/}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    volumes:
      - floodingnaque_backups_prod:/backups:ro
    networks:
      - floodingnaque-backend
    profiles:
      - backup-offsite
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      <<: *logging-default

  # ===================
  # PgBouncer Connection Pooler
  # ===================
  # Always-on connection pooler — critical for Supabase ~60 connection limit.
  # Without PgBouncer, 4 workers × 20 pool = 80 connections would exhaust Supabase.
  pgbouncer:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    image: floodingnaque-pgbouncer:1.21.0
    container_name: floodingnaque-pgbouncer-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "pgbouncer"
      com.floodingnaque.description: "PostgreSQL Connection Pooler"
      com.floodingnaque.version: "1.21.0"
    ports:
      - "127.0.0.1:6432:6432"
    environment:
      # Database connection (from .env.production)
      - DB_HOST=${PGBOUNCER_DB_HOST:-db.your-project-ref.supabase.co}
      - DB_PORT=${PGBOUNCER_DB_PORT:-5432}
      - DB_NAME=${PGBOUNCER_DB_NAME:-postgres}
      - DB_USER=${PGBOUNCER_DB_USER:-postgres}
      - DB_PASSWORD=${PGBOUNCER_DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE:-verify-full}
      # Read replica (optional)
      - DB_REPLICA_HOST=${DB_REPLICA_HOST:-}
      - DB_REPLICA_PORT=${DB_REPLICA_PORT:-5432}
      # Pool settings (tuned for Supabase Pro ~60 connections)
      - PGBOUNCER_POOL_MODE=${PGBOUNCER_POOL_MODE:-transaction}
      - PGBOUNCER_MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-200}
      - PGBOUNCER_DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-35}
      - PGBOUNCER_MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE:-5}
      - PGBOUNCER_RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-10}
      - PGBOUNCER_MAX_DB_CONNECTIONS=${PGBOUNCER_MAX_DB_CONNECTIONS:-50}
      # Admin credentials
      - PGBOUNCER_ADMIN_USER=${PGBOUNCER_ADMIN_USER:-pgbouncer_admin}
      - PGBOUNCER_ADMIN_PASSWORD=${PGBOUNCER_ADMIN_PASSWORD}
      - PGBOUNCER_STATS_USER=${PGBOUNCER_STATS_USER:-pgbouncer_stats}
      - PGBOUNCER_STATS_PASSWORD=${PGBOUNCER_STATS_PASSWORD}
      # Docker Secrets _FILE references
      - DB_PASSWORD_FILE=/run/secrets/pgbouncer_db_password
      - PGBOUNCER_ADMIN_PASSWORD_FILE=/run/secrets/pgbouncer_admin_password
      - PGBOUNCER_STATS_PASSWORD_FILE=/run/secrets/pgbouncer_stats_password
    secrets:
      - pgbouncer_db_password
      - pgbouncer_admin_password
      - pgbouncer_stats_password
    networks:
      - floodingnaque-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Infrastructure Metric Exporters
  # ===================
  # These expose /metrics endpoints for Prometheus to scrape.
  # Enable with: --profile monitoring

  # PostgreSQL Exporter
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: floodingnaque-postgres-exporter
    restart: unless-stopped
    labels:
      com.floodingnaque.service: "postgres-exporter"
    environment:
      - DATA_SOURCE_URI=${PGBOUNCER_DB_HOST:-db}:${PGBOUNCER_DB_PORT:-5432}/${PGBOUNCER_DB_NAME:-postgres}?sslmode=${DB_SSL_MODE:-require}
      - DATA_SOURCE_USER=${PGBOUNCER_DB_USER:-postgres}
      - DATA_SOURCE_PASS_FILE=/run/secrets/pgbouncer_db_password
    secrets:
      - pgbouncer_db_password
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      <<: *logging-default
    <<: *security-opts

  # PgBouncer Exporter
  pgbouncer-exporter:
    image: quay.io/prometheuscommunity/pgbouncer-exporter:v0.8.0
    container_name: floodingnaque-pgbouncer-exporter
    restart: unless-stopped
    labels:
      com.floodingnaque.service: "pgbouncer-exporter"
    environment:
      - PGBOUNCER_EXPORTER_HOST=pgbouncer
      - PGBOUNCER_EXPORTER_PORT=6432
      - PGBOUNCER_EXPORTER_USER=${PGBOUNCER_STATS_USER:-pgbouncer_stats}
      - PGBOUNCER_EXPORTER_PASS=${PGBOUNCER_STATS_PASSWORD}
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    depends_on:
      - pgbouncer
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9127/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      <<: *logging-default
    <<: *security-opts

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: floodingnaque-redis-exporter
    restart: unless-stopped
    labels:
      com.floodingnaque.service: "redis-exporter"
    environment:
      - REDIS_ADDR=${REDIS_EXPORTER_URL:-redis://redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      <<: *logging-default
    <<: *security-opts

  # Celery Prometheus Exporter
  # Provides metrics at :9808/metrics for Prometheus scraping
  celery-exporter:
    image: danihodovic/celery-exporter:0.10.8
    container_name: floodingnaque-celery-exporter
    restart: unless-stopped
    labels:
      com.floodingnaque.service: "celery-exporter"
    command:
      - "--broker-url=${CELERY_BROKER_URL:-redis://redis:6379/1}"
    ports:
      - "127.0.0.1:9808:9808"
    networks:
      - floodingnaque-backend
      - floodingnaque-monitoring
    depends_on:
      celery-worker:
        condition: service_healthy
        required: false
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9808/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      <<: *logging-default
    <<: *security-opts

  # Nginx Prometheus Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: floodingnaque-nginx-exporter
    restart: unless-stopped
    labels:
      com.floodingnaque.service: "nginx-exporter"
    command:
      - "--nginx.scrape-uri=http://nginx:8080/stub_status"
    networks:
      - floodingnaque-frontend
      - floodingnaque-monitoring
    depends_on:
      - nginx
    profiles:
      - monitoring
      - nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9113/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Prometheus Monitoring
  # ===================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: floodingnaque-prometheus-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "prometheus"
      com.floodingnaque.description: "Metrics Collection"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data_prod:/prometheus
    networks:
      - floodingnaque-monitoring
      - floodingnaque-backend
    depends_on:
      - backend
    profiles:
      - monitoring
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        <<: *resources-small
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Nginx Reverse Proxy (TLS Termination)
  # ===================
  # Use with: --profile nginx
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: floodingnaque-nginx-prod
    restart: always
    labels:
      com.floodingnaque.project: "floodingnaque"
      com.floodingnaque.maintainer: "Floodingnaque Team"
      com.floodingnaque.service: "nginx"
      com.floodingnaque.description: "Reverse Proxy with TLS"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/floodingnaque.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf_prod:/etc/letsencrypt:ro
      - certbot_www_prod:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - floodingnaque-frontend
      - floodingnaque-backend
    profiles:
      - nginx
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost/health || wget -q --spider http://localhost/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      <<: *logging-default
    <<: *security-opts

  # ===================
  # Certbot (Let's Encrypt)
  # ===================
  # Use with: --profile nginx
  # Initial certificate:
  #   docker compose -f compose.production.yaml --profile nginx run --rm certbot \
  #     certonly --webroot -w /var/www/certbot -d api.floodingnaque.com --email your@email.com --agree-tos
  # Manual renewal:
  #   docker compose -f compose.production.yaml --profile nginx run --rm certbot renew
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: floodingnaque-certbot-prod
    volumes:
      - certbot_conf_prod:/etc/letsencrypt
      - certbot_www_prod:/var/www/certbot
    networks:
      - floodingnaque-frontend
    profiles:
      - nginx
    entrypoint: '/bin/sh -c ''trap exit TERM; while :; do certbot renew --deploy-hook "echo Certificate renewed at $(date)" 2>&1; sleep 12h & wait $${!}; done;'''
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      <<: *logging-default

  # ===================
  # ML Training Service (one-shot retraining)
  # ===================
  # Usage: docker compose -f compose.production.yaml run --rm ml-training
  ml-training:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: floodingnaque-api:production-v2.0.0
    container_name: floodingnaque-ml-training
    restart: "no"
    <<: *security-opts
    environment:
      - PYTHONPATH=/app
      - DATA_PROVENANCE_ENABLED=true
      - SYNTHETIC_DATA_ALLOWED=false
      - MODEL_SIGNING_KEY_FILE=/run/secrets/model_signing_key
    secrets:
      - model_signing_key
    volumes:
      - floodingnaque_models_prod:/app/models
      - floodingnaque_data_prod:/app/data:ro
      - ./backend/reports:/app/reports
      - ./backend/config:/app/config:ro
    networks:
      - floodingnaque-backend
    entrypoint:
      [
        "python",
        "scripts/train_progressive_v6.py",
        "--grid-search",
        "--cv-folds",
        "10",
      ]
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G
    logging:
      <<: *logging-default
    profiles:
      - ml-training

# ===================
# Networks (Segmented for Security)
# ===================
networks:
  # Frontend network - Nginx and external-facing services
  floodingnaque-frontend:
    driver: bridge
    name: floodingnaque-frontend-production
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"

  # Backend network - API, Celery workers, and internal services
  floodingnaque-backend:
    driver: bridge
    name: floodingnaque-backend-production
    internal: true # Backend services accessed only via Nginx
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"

  # Monitoring network - Prometheus and observability tools
  floodingnaque-monitoring:
    driver: bridge
    name: floodingnaque-monitoring-production
    internal: true # No external access for monitoring network
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.driver.mtu: "1500"

# ===================
# Volumes
# ===================
volumes:
  floodingnaque_models_prod:
    name: floodingnaque-models-production
    driver: local
  floodingnaque_logs_prod:
    name: floodingnaque-logs-production
    driver: local
  floodingnaque_data_prod:
    name: floodingnaque-data-production
    driver: local
  floodingnaque_uploads_prod:
    name: floodingnaque-uploads-production
    driver: local
  floodingnaque_backups_prod:
    name: floodingnaque-backups-production
    driver: local
  prometheus_data_prod:
    name: floodingnaque-prometheus-production
    driver: local
  certbot_conf_prod:
    name: floodingnaque-certbot-conf-production
    driver: local
  certbot_www_prod:
    name: floodingnaque-certbot-www-production
    driver: local

# ===================
# Docker Secrets Documentation
# ===================
# Docker Secrets are now configured in this file. Secrets are defined at the top
# level and referenced by services that need them.
#
# How it works:
#   1. Secrets are defined in the 'secrets:' section at the top of this file
#   2. Services reference secrets they need via their 'secrets:' key
#   3. Environment variables with _FILE suffix point to /run/secrets/<name>
#   4. The backend/app/utils/secrets.py reads files automatically
#
# Setup:
#   1. Create secrets directory: mkdir -p ./secrets
#   2. Create secret files (one secret per file, no trailing newline):
#      echo -n "your-secret-value" > ./secrets/secret_key.txt
#   3. Set proper permissions: chmod 600 ./secrets/*.txt
#   4. Run: docker compose -f compose.production.yaml up -d
#
# For Docker Swarm deployments:
#   docker secret create secret_key ./secrets/secret_key.txt
#   docker stack deploy -c compose.production.yaml floodingnaque
#
# See docs/DOCKER_SECRETS_SETUP.md for detailed instructions.
