# ===================
# Docker Secrets Documentation
# ===================
# Docker Secrets are now configured in this file. Secrets are defined at the top
# level and referenced by services that need them.
#
# How it works:
#   1. Secrets are defined in the 'secrets:' section at the top of this file
#   2. Services reference secrets they need via their 'secrets:' key
#   3. Environment variables with _FILE suffix point to /run/secrets/<name>
#   4. The backend/app/utils/secrets.py reads files automatically
#
# Setup:
#   1. Create secrets directory: mkdir -p ./secrets
#   2. Create secret files (one secret per file, no trailing newline):
#      echo -n "your-secret-value" > ./secrets/secret_key.txt
#   3. Set proper permissions: chmod 600 ./secrets/*.txt
#   4. Run: docker compose -f compose.production.yaml up -d
#
# For Docker Swarm deployments:
#   docker secret create secret_key ./secrets/secret_key.txt
#   docker stack deploy -c compose.production.yaml floodingnaque
#
# See docs/DOCKER_SECRETS_SETUP.md for detailed instructions.
