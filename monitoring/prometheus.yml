# =====================================================
# Prometheus Configuration for Floodingnaque
# =====================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'floodingnaque-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Floodingnaque Backend API
  - job_name: 'floodingnaque-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'floodingnaque-api'

  # PostgreSQL (via postgres_exporter sidecar)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # PgBouncer (via pgbouncer_exporter sidecar)
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer-exporter:9127']

  # Redis (via redis_exporter sidecar)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Nginx (via nginx-prometheus-exporter sidecar)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
