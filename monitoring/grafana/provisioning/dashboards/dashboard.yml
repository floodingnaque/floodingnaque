# Grafana Dashboard Provider Configuration
# Auto-provisions dashboards from JSON files on startup.
apiVersion: 1

providers:
  - name: 'Floodingnaque'
    orgId: 1
    folder: 'Floodingnaque'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
