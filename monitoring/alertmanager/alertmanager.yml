# =====================================================
# Alertmanager Configuration for Floodingnaque
# =====================================================
# Routes alerts from Prometheus to notification channels.
# Customize receivers with your Slack webhook, email, or PagerDuty.
#
# Docs: https://prometheus.io/docs/alerting/latest/configuration/
# =====================================================

global:
  # SMTP settings for email notifications
  # Set these via environment variables or replace with your values:
  #   ALERTMANAGER_SMTP_HOST, ALERTMANAGER_SMTP_FROM,
  #   ALERTMANAGER_SMTP_USER, ALERTMANAGER_SMTP_PASSWORD
  smtp_smarthost: '{{ .Env.ALERTMANAGER_SMTP_HOST | default "smtp.gmail.com:587" }}'
  smtp_from: '{{ .Env.ALERTMANAGER_SMTP_FROM | default "alerts@floodingnaque.com" }}'
  smtp_auth_username: '{{ .Env.ALERTMANAGER_SMTP_USER | default "" }}'
  smtp_auth_password: '{{ .Env.ALERTMANAGER_SMTP_PASSWORD | default "" }}'
  smtp_require_tls: true

  resolve_timeout: 5m

# Notification templates
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'

# Alert routing tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'service']

  # Wait before sending initial notification (batch alerts)
  group_wait: 30s

  # Wait before sending updates to existing groups
  group_interval: 5m

  # Wait before re-sending a resolved alert
  repeat_interval: 4h

  # Child routes for severity-based routing
  routes:
    # Watchdog (deadman switch) - routed to null receiver to suppress noise
    - match:
        alertname: Watchdog
      receiver: 'watchdog-receiver'
      repeat_interval: 1m

    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts - normal cadence
    - match:
        severity: warning
      receiver: 'default-receiver'
      repeat_interval: 4h

# Inhibition rules - suppress lower-severity alerts when critical fires
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Notification receivers
receivers:
  # Default - email notifications for warnings
  - name: 'default-receiver'
    email_configs:
      - to: '{{ .Env.ALERTMANAGER_NOTIFY_EMAIL | default "team@floodingnaque.com" }}'
        send_resolved: true
        headers:
          Subject: '[Floodingnaque][{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    # Optional Slack integration (uncomment and set ALERTMANAGER_SLACK_WEBHOOK env var):
    # slack_configs:
    #   - api_url: '{{ .Env.ALERTMANAGER_SLACK_WEBHOOK }}'
    #     channel: '#floodingnaque-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: >-
    #       {{ range .Alerts }}
    #       *Alert:* {{ .Annotations.summary }}
    #       *Severity:* {{ .Labels.severity }}
    #       *Description:* {{ .Annotations.description }}
    #       {{ end }}

  # Critical - immediate email notification
  - name: 'critical-receiver'
    email_configs:
      - to: '{{ .Env.ALERTMANAGER_NOTIFY_EMAIL | default "team@floodingnaque.com" }}'
        send_resolved: true
        headers:
          Subject: '[Floodingnaque][CRITICAL] {{ .GroupLabels.alertname }}'
    # Optional Slack for critical alerts:
    # slack_configs:
    #   - api_url: '{{ .Env.ALERTMANAGER_SLACK_WEBHOOK }}'
    #     channel: '#floodingnaque-critical'
    #     title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
    #     text: >-
    #       {{ range .Alerts }}
    #       *Alert:* {{ .Annotations.summary }}
    #       *Instance:* {{ .Labels.instance }}
    #       *Description:* {{ .Annotations.description }}
    #       {{ end }}

  # Watchdog - null receiver (deadman switch only needs to exist in external system)
  - name: 'watchdog-receiver'
