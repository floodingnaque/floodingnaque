# ==================================================
# Floodingnaque - Nginx Reverse Proxy Configuration
# ==================================================
# This configuration provides:
# - TLS/SSL termination with Let's Encrypt
# - HTTP to HTTPS redirect
# - Security headers
# - WebSocket support
# - Rate limiting at proxy level
# - Gzip compression
# - Upstream load balancing (optional)
# ==================================================

# Upstream backend servers
upstream floodingnaque_api {
    # Single server (default)
    server backend:5000;

    # Keep connections alive for better performance
    keepalive 32;
}

# Canary upstream — activated by deploying the backend-canary service
# Traffic is routed via split_clients below
upstream floodingnaque_api_canary {
    server backend-canary:5000;
    keepalive 8;
}

# Split 5% of traffic to the canary based on request_id.
# Change the percentage by adjusting the boundary (e.g., 10% = 10*).
# Set to 0% (remove the canary block) to disable.
split_clients "${request_id}" $upstream_variant {
    5%    canary;
    *     production;
}

# Map variant → upstream name for proxy_pass
map $upstream_variant $backend_pool {
    canary     floodingnaque_api_canary;
    default    floodingnaque_api;
}

# Upstream frontend server (React SPA served by Nginx in container)
upstream floodingnaque_frontend {
    server frontend:3000;
    keepalive 16;
}

# Trust X-Forwarded-For from known load balancer / Docker networks
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=prediction_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Rate limit response code (429 Too Many Requests)
limit_req_status 429;
limit_conn_status 429;

# HTTP - Redirect all to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.floodingnaque.com floodingnaque.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Main configuration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.floodingnaque.com;

    # ========================================
    # SSL Configuration
    # ========================================

    # Certificate files (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.floodingnaque.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.floodingnaque.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.floodingnaque.com/chain.pem;

    # SSL settings (modern configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Diffie-Hellman parameters for DHE ciphers
    # Generate with: openssl dhparam -out /etc/nginx/dhparam.pem 2048
    ssl_dhparam /etc/nginx/dhparam.pem;

    # SSL session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========================================
    # Security Headers
    # ========================================

    # HSTS (31536000 seconds = 1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy - updated for frontend SPA serving
    # script-src and style-src allow inline for React hydration
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.floodingnaque.com; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Permissions policy - disable all browser features (API server, no UI)
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

    # Cross-Origin isolation headers
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Hide upstream server details
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    server_tokens off;

    # ========================================
    # Logging
    # ========================================

    access_log /var/log/nginx/floodingnaque_access.log combined;
    error_log /var/log/nginx/floodingnaque_error.log warn;

    # ========================================
    # Gzip Compression
    # ========================================

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # ========================================
    # Client Settings
    # ========================================

    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ========================================
    # Locations
    # ========================================

    # Canary tracking header — lets clients and monitoring see which variant served the request
    add_header X-Served-By $upstream_variant always;

    # Health check (no rate limiting) — always goes to production upstream
    location /health {
        proxy_pass http://floodingnaque_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't log health checks
        access_log off;
    }

    # Metrics endpoint (restrict access)
    location /metrics {
        # Only allow internal monitoring
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://floodingnaque_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Prediction endpoint (stricter rate limiting)
    location /api/v1/predict {
        limit_req zone=prediction_limit burst=10 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://$backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML predictions
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Auth endpoints (strict rate limiting to prevent brute force)
    location /api/v1/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://floodingnaque_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # SSE (Server-Sent Events) - disable buffering for real-time streaming
    location /api/v1/sse {
        limit_req zone=api_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://floodingnaque_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;

        # Long timeout for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API endpoints (standard rate limiting)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://$backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support (if needed)
    location /ws {
        limit_req zone=api_limit burst=5 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://floodingnaque_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static assets from frontend (hashed, long cache)
    location /assets/ {
        proxy_pass http://floodingnaque_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Frontend SPA - serve React app for all non-API routes
    location / {
        proxy_pass http://floodingnaque_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Prevent stale SPA shell caching while keeping /assets immutable.
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ ^/(\.env|\.git|\.htaccess) {
        deny all;
        return 404;
    }
}

# Metrics endpoint for nginx-prometheus-exporter
# Listens on port 8080 (internal only, not exposed externally)
server {
    listen 8080;
    server_name _;

    location /stub_status {
        stub_status;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        return 404;
    }
}
