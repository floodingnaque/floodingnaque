# =====================================================
# Floodingnaque - Microservices API Gateway (nginx)
# =====================================================
# Path-based routing to individual microservices.
# All frontend requests go through this single entry point.
#
# Service Routing:
#   /api/v1/weather/*   → weather-collector:5001
#   /api/v1/predict/*   → ml-prediction:5002
#   /api/v1/models/*    → ml-prediction:5002
#   /api/v1/alerts/*    → alert-notification:5003
#   /api/v1/auth/*      → user-management:5004
#   /api/v1/users/*     → user-management:5004
#   /api/v1/dashboard/* → dashboard-api:5005
#   /health             → gateway health aggregation
# =====================================================

# Upstream service definitions with keepalive connections
upstream weather_service {
    server weather-collector:5001;
    keepalive 16;
}

upstream prediction_service {
    server ml-prediction:5002;
    keepalive 16;
}

upstream alert_service {
    server alert-notification:5003;
    keepalive 16;
}

upstream user_service {
    server user-management:5004;
    keepalive 16;
}

upstream dashboard_service {
    server dashboard-api:5005;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=5r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name localhost floodingnaque.local;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Request-ID $request_id always;

    # Connection limits
    limit_conn conn_limit 50;

    # Request body size
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 30s;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";

    # ─── Gateway Health ─────────────────────────
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"api-gateway","timestamp":"$time_iso8601"}';
    }

    # ─── Weather Data Collector Service ─────────
    location /api/v1/weather/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://weather_service;
    }

    location /api/v1/weather/ingest {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://weather_service;
    }

    location /api/v1/weather/tides {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://weather_service;
    }

    # ─── ML Prediction Service ──────────────────
    location /api/v1/predict/ {
        limit_req zone=predict_limit burst=5 nodelay;
        proxy_read_timeout 120s;  # ML inference can be slow
        proxy_pass http://prediction_service;
    }

    location /api/v1/predict/batch {
        limit_req zone=predict_limit burst=2 nodelay;
        proxy_read_timeout 300s;  # Batch predictions
        proxy_pass http://prediction_service;
    }

    location /api/v1/models/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://prediction_service;
    }

    # ─── Alert Notification Service ─────────────
    location /api/v1/alerts/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://alert_service;
    }

    # SSE endpoint - long-lived connections, no buffering
    location /api/v1/alerts/stream {
        proxy_pass http://alert_service;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    location /api/v1/webhooks/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://alert_service;
    }

    location /api/v1/notifications/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://alert_service;
    }

    # ─── User Management Service ────────────────
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://user_service;
    }

    location /api/v1/users/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://user_service;
    }

    location /api/v1/admin/ {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://user_service;
    }

    # ─── Dashboard API Service ──────────────────
    location /api/v1/dashboard/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://dashboard_service;
    }

    location /api/v1/dashboard/export/ {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_read_timeout 120s;  # Export can generate large files
        proxy_pass http://dashboard_service;
    }

    # ─── Service Health Endpoints ───────────────
    # Expose individual service health checks via gateway
    location /services/weather-collector/health {
        internal;
        proxy_pass http://weather_service/health;
    }

    location /services/ml-prediction/health {
        internal;
        proxy_pass http://prediction_service/health;
    }

    location /services/alert-notification/health {
        internal;
        proxy_pass http://alert_service/health;
    }

    location /services/user-management/health {
        internal;
        proxy_pass http://user_service/health;
    }

    location /services/dashboard-api/health {
        internal;
        proxy_pass http://dashboard_service/health;
    }

    # ─── CORS Preflight ────────────────────────
    location ~ ^/api/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Trace-ID';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ─── Error pages ───────────────────────────
    error_page 502 /502.json;
    location = /502.json {
        default_type application/json;
        return 502 '{"status":"error","type":"https://httpstatuses.com/502","title":"Bad Gateway","detail":"The upstream service is unavailable. Please try again later."}';
    }

    error_page 503 /503.json;
    location = /503.json {
        default_type application/json;
        return 503 '{"status":"error","type":"https://httpstatuses.com/503","title":"Service Unavailable","detail":"The service is temporarily overloaded. Please retry after a few seconds."}';
    }

    error_page 504 /504.json;
    location = /504.json {
        default_type application/json;
        return 504 '{"status":"error","type":"https://httpstatuses.com/504","title":"Gateway Timeout","detail":"The upstream service did not respond in time."}';
    }

    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"status":"error","type":"https://httpstatuses.com/429","title":"Too Many Requests","detail":"Rate limit exceeded. Please slow down."}';
    }
}

